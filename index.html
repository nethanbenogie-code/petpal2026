<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#f7c5cc" />
    <title>PetPal — AI Companion + Journal + Shooter</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <style>
        /* ─── ROOT ─── */
        :root {
            --bg: #f7c5cc;
            --shell: #ffe0e5;
            --shell-2: #f4a8b3;
            --screen: #c9e8b5;
            --ink: #1a2b0f;
            --btn: #ffb3c1;
            --btn-hover: #ff8fa6;
            --btn-active: #e07688;
            --gold: #f7d774;
            --danger: #e56b6f;
            --ok: #7bc47f;
            --shadow: 0 8px 32px rgba(200, 80, 110, 0.25);
            --radius: 20px;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: radial-gradient(circle at 30% 20%, #ffd6dc, var(--bg));
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            user-select: none;
            -webkit-user-select: none;
        }
        /* ─── DEVICE ─── */
        .device {
            width: 100%;
            max-width: 420px;
            height: 100dvh;
            max-height: 900px;
            background: linear-gradient(160deg, var(--shell), var(--shell-2));
            border-radius: 32px;
            padding: 14px 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.08), inset 0 2px 0 rgba(255, 255, 255, 0.5), var(--shadow);
            position: relative;
            overflow: hidden;
        }
        /* ─── TOPBAR ─── */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2px;
            font-size: 12px;
            font-weight: 700;
            color: #7a3a48;
            flex-shrink: 0;
        }
        .topbar .name-box {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .badge {
            background: rgba(255, 255, 255, 0.5);
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 10px;
        }
        .coin-badge {
            background: linear-gradient(180deg, #ffe58a, var(--gold));
            color: #6b4a00;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 3px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }
        .top-btns {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .icon-btn {
            background: rgba(255, 255, 255, 0.5);
            border: none;
            color: #7a3a48;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
        }
        .icon-btn:active {
            transform: scale(0.92);
        }
        .icon-btn.on {
            background: var(--btn-active);
            color: white;
        }
        /* ─── SCREEN ─── */
        .screen {
            background: linear-gradient(180deg, #d5f0c2, var(--screen));
            border-radius: var(--radius);
            padding: 10px;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.15), inset 0 -1px 0 rgba(255, 255, 255, 0.4);
            position: relative;
            overflow: hidden;
            transition: background 1.2s ease;
        }
        .screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.02) 0, rgba(0, 0, 0, 0.02) 1px, transparent 1px, transparent 3px);
            pointer-events: none;
        }
        /* ─── STATS ─── */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            font-size: 9px;
            font-weight: 700;
            color: var(--ink);
            flex-shrink: 0;
        }
        .stat {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .stat-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-bar {
            height: 5px;
            background: rgba(0, 0, 0, 0.12);
            border-radius: 4px;
            overflow: hidden;
        }
        .stat-fill {
            height: 100%;
            background: var(--ink);
            border-radius: 4px;
            transition: width 0.4s ease, background 0.3s;
        }
        .stat-fill.low {
            background: var(--danger);
        }
        .stat-fill.mid {
            background: #b58900;
        }
        /* ─── PET STAGE ─── */
        .pet-stage {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.15);
        }
        .pet-scene {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .ground {
            position: absolute;
            bottom: 6px;
            left: 10%;
            right: 10%;
            height: 4px;
            background: rgba(0, 0, 0, 0.12);
            border-radius: 50%;
            filter: blur(2px);
            pointer-events: none;
        }
        #pet-wrap {
            position: absolute;
            cursor: grab;
            touch-action: none;
            transition: filter 0.2s;
            z-index: 10;
            width: 55%;
            max-width: 180px;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }
        #pet-wrap:active {
            cursor: grabbing;
        }
        #pet-wrap.dragging {
            filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.3));
            transition: filter 0.1s;
        }
        #pet {
            width: 100%;
            height: 100%;
            animation: idle 3s ease-in-out infinite;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.15));
            pointer-events: none;
        }
        #pet-wrap.sleeping #pet {
            animation: sleep 4s ease-in-out infinite;
        }
        #pet-wrap.happy #pet {
            animation: bounce 0.8s ease-in-out infinite;
        }
        #pet-wrap.sad #pet {
            animation: sway 4s ease-in-out infinite;
            opacity: 0.85;
        }
        #pet-wrap.playing #pet {
            animation: bounce 0.5s ease-in-out infinite;
        }
        #pet-wrap.eating #pet {
            animation: eat 0.4s ease-in-out infinite;
        }
        #pet-wrap.bathing #pet {
            animation: shake 0.3s ease-in-out infinite;
        }
        #pet-wrap.spin #pet {
            animation: spin 1s ease-in-out;
        }
        #pet-wrap.jump #pet {
            animation: jump 0.8s ease-in-out;
        }
        #pet-wrap.dance #pet {
            animation: dance 1.5s ease-in-out;
        }
        @keyframes idle {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-16px) scale(1.05);
            }
        }
        @keyframes sleep {
            0%,
            100% {
                transform: scale(1, 1);
            }
            50% {
                transform: scale(1.03, 0.97);
            }
        }
        @keyframes sway {
            0%,
            100% {
                transform: rotate(-3deg);
            }
            50% {
                transform: rotate(3deg);
            }
        }
        @keyframes eat {
            0%,
            100% {
                transform: scale(1, 1);
            }
            50% {
                transform: scale(1.05, 0.95);
            }
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(-3px);
            }
            50% {
                transform: translateX(3px);
            }
        }
        @keyframes spin {
            0% {
                transform: rotate(0);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        @keyframes jump {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-40px);
            }
        }
        @keyframes dance {
            0%,
            100% {
                transform: rotate(0) translateY(0);
            }
            25% {
                transform: rotate(-15deg) translateY(-6px);
            }
            50% {
                transform: rotate(0) translateY(-10px);
            }
            75% {
                transform: rotate(15deg) translateY(-6px);
            }
        }
        .playmate {
            position: absolute;
            pointer-events: none;
            z-index: 5;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0.9;
            width: 40px;
            height: 40px;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.15));
            animation: floatMate 3s ease-in-out infinite;
        }
        .playmate .mate-label {
            position: absolute;
            bottom: -16px;
            font-size: 7px;
            font-weight: 700;
            color: rgba(0, 0, 0, 0.5);
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.6);
            padding: 1px 6px;
            border-radius: 4px;
        }
        @keyframes floatMate {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }
        .bubble {
            position: absolute;
            top: 6px;
            left: 8px;
            right: 8px;
            background: white;
            color: var(--ink);
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 12px;
            line-height: 1.3;
            font-weight: 600;
            box-shadow: 0 3px 0 rgba(0, 0, 0, 0.15);
            border: 2px solid var(--ink);
            max-width: 90%;
            margin: 0 auto;
            z-index: 20;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s;
            pointer-events: none;
        }
        .bubble.show {
            opacity: 1;
            transform: translateY(0);
        }
        .bubble::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border: 6px solid transparent;
            border-top-color: var(--ink);
        }
        .bubble::before {
            content: "";
            position: absolute;
            bottom: -7px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border: 5px solid transparent;
            border-top-color: white;
            z-index: 1;
        }
        .mood-tag,
        .stage-info,
        .time-tag {
            position: absolute;
            bottom: 4px;
            font-size: 8px;
            color: rgba(0, 0, 0, 0.4);
            font-weight: 700;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 2;
        }
        .mood-tag {
            left: 6px;
        }
        .stage-info {
            right: 6px;
        }
        .time-tag {
            left: 50%;
            transform: translateX(-50%);
        }
        .zzz {
            position: absolute;
            top: 8%;
            right: 20%;
            font-size: 22px;
            font-weight: 700;
            color: var(--ink);
            opacity: 0;
            animation: zzz 3s ease-in-out infinite;
            pointer-events: none;
            z-index: 3;
        }
        @keyframes zzz {
            0% {
                opacity: 0;
                transform: translate(0, 0);
            }
            30% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(20px, -30px);
            }
        }
        .hearts {
            position: absolute;
            pointer-events: none;
            inset: 0;
            z-index: 4;
        }
        .heart {
            position: absolute;
            font-size: 18px;
            animation: rise 1.5s ease-out forwards;
        }
        @keyframes rise {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px) scale(1.2);
            }
        }
        /* ─── ACTIONS ─── */
        .actions {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            flex-shrink: 0;
        }
        .action {
            background: linear-gradient(180deg, var(--btn), var(--btn-hover));
            border: none;
            border-radius: 10px;
            padding: 6px 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            color: #4a1424;
            font-family: inherit;
            font-size: 8px;
            font-weight: 700;
            box-shadow: 0 3px 0 var(--btn-active), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
            letter-spacing: 0.2px;
        }
        .action:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 var(--btn-active), inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }
        .action-icon {
            font-size: 18px;
            line-height: 1;
        }
        /* ─── CHAT BAR ─── */
        .chat-bar {
            display: flex;
            gap: 5px;
            align-items: center;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 999px;
            padding: 3px 3px 3px 12px;
            flex-shrink: 0;
        }
        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 13px;
            color: var(--ink);
            padding: 6px 0;
            min-width: 0;
        }
        .chat-input::placeholder {
            color: rgba(0, 0, 0, 0.35);
        }
        .chat-btn {
            background: var(--ink);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.15s;
        }
        .chat-btn:active {
            transform: scale(0.92);
        }
        .chat-btn.mic {
            background: #d64545;
        }
        .chat-btn.mic.listening {
            background: #e56b6f;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }
        .log {
            max-height: 40px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            padding: 3px 8px;
            font-size: 10px;
            color: #333;
            line-height: 1.3;
            display: flex;
            flex-direction: column;
            gap: 1px;
            flex-shrink: 0;
        }
        .log-entry.me {
            color: #7a3a48;
            font-weight: 600;
        }
        .log-entry.pet {
            color: #1a5a2b;
            font-weight: 600;
        }
        .log-entry.system {
            font-style: italic;
            color: #888;
        }
        /* scene backgrounds */
        .park-bg {
            background: linear-gradient(180deg, #a0d8ef 0%, #a0d8ef 55%, #7bc47f 55%, #7bc47f 100%);
        }
        .bath-bg {
            background: linear-gradient(180deg, #d0edf7, #a0d8ef);
        }
        .night-bg {
            background: linear-gradient(180deg, #1a2b52, #2b3a52);
        }
        .night-bg .stat,
        .night-bg .mood-tag,
        .night-bg .stage-info,
        .night-bg .time-tag {
            color: #ddd;
        }
        .dawn-bg {
            background: linear-gradient(180deg, #ffb99f 0%, #ffd6a5 50%, #c9e8b5 100%);
        }
        .dusk-bg {
            background: linear-gradient(180deg, #7a5c8a 0%, #d67a6a 50%, #8ac273 100%);
        }
        .dusk-bg .stat,
        .dusk-bg .mood-tag,
        .dusk-bg .stage-info,
        .dusk-bg .time-tag {
            color: #eee;
        }
        .beach-bg {
            background: linear-gradient(180deg, #fde8c8 0%, #fde8c8 50%, #7bc4f0 50%, #7bc4f0 100%);
        }
        .forest-bg {
            background: linear-gradient(180deg, #a8d5a2 0%, #5a8f4a 100%);
        }
        .city-bg {
            background: linear-gradient(180deg, #b8c6d4 0%, #6a7a8a 100%);
        }
        .mountain-bg {
            background: linear-gradient(180deg, #e8edf0 0%, #b8c8d8 40%, #7a9a7a 100%);
        }
        .space-bg {
            background: linear-gradient(180deg, #0a0a2a 0%, #1a1a4a 100%);
        }
        .space-bg .stat,
        .space-bg .mood-tag,
        .space-bg .stage-info,
        .space-bg .time-tag {
            color: #eee;
        }
        .snow-bg {
            background: linear-gradient(180deg, #e8f0f8 0%, #d0e0f0 100%);
        }
        .rain-bg {
            background: linear-gradient(180deg, #6a7a8a 0%, #4a5a6a 100%);
        }
        .rain-bg .stat,
        .rain-bg .mood-tag,
        .rain-bg .stage-info,
        .rain-bg .time-tag {
            color: #eee;
        }
        .decor {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }
        .star {
            position: absolute;
            color: white;
            font-size: 10px;
            opacity: 0.7;
            animation: twinkle 2s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.2;
            }
            50% {
                opacity: 1;
            }
        }
        .rain-drop {
            position: absolute;
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            animation: rainFall 1.2s linear infinite;
        }
        @keyframes rainFall {
            0% {
                transform: translateY(-20px);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(100%);
                opacity: 0;
            }
        }
        .snowflake {
            position: absolute;
            color: white;
            font-size: 12px;
            opacity: 0.8;
            animation: snowFall 3s linear infinite;
        }
        @keyframes snowFall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(100%) rotate(360deg);
                opacity: 0;
            }
        }
        .flash {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 25;
            border-radius: var(--radius);
        }
        .flash.on {
            animation: flash 0.4s ease-out;
        }
        @keyframes flash {
            0% {
                opacity: 0.8;
            }
            100% {
                opacity: 0;
            }
        }
        .toast {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--ink);
            color: white;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s;
            z-index: 40;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.coin {
            background: var(--gold);
            color: #6b4a00;
        }
        .toast.achievement {
            background: #4a8ec4;
            color: white;
        }
        /* ─── MODAL ─── */
        .modal-bg {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 32px;
            padding: 16px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .modal-bg.show {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 20px;
            padding: 16px;
            width: 100%;
            max-width: 340px;
            max-height: 85%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalPop 0.3s ease-out;
        }
        @keyframes modalPop {
            0% {
                transform: scale(0.9) translateY(20px);
                opacity: 0;
            }
            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        .modal-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--ink);
        }
        .modal-close {
            background: #eee;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            font-size: 13px;
        }
        .modal-body p {
            margin-bottom: 8px;
            line-height: 1.5;
            color: #444;
        }

        /* ─── AUDIO ─── */
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                try { audioCtx = new(window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
            }
        }

        function chirp(type = "happy") {
            if (!state.voiceEnabled) return;
            initAudio();
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const notes = {
                happy: [600, 900],
                sad: [400, 300],
                eat: [500, 550, 500],
                coin: [880, 1320],
                beep: [700],
                love: [700, 900, 1100],
                error: [200],
                hunt: [400, 600, 800],
                level: [600, 800, 1000, 1200],
            } [type] || [500];
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = "triangle";
                osc.frequency.value = freq;
                gain.gain.value = 0;
                gain.gain.setValueAtTime(0, now + i * 0.08);
                gain.gain.linearRampToValueAtTime(0.12, now + i * 0.08 + 0.01);
                gain.gain.linearRampToValueAtTime(0, now + i * 0.08 + 0.08);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start(now + i * 0.08);
                osc.stop(now + i * 0.08 + 0.1);
            });
        }

        let ttsVoice = null;

        function initTTS() {
            if (!("speechSynthesis" in window)) return;
            const pick = () => {
                const voices = speechSynthesis.getVoices();
                ttsVoice = voices.find(v => /child|kid|female/i.test(v.name)) ||
                    voices.find(v => v.lang.startsWith("en")) ||
                    voices[0];
            };
            pick();
            speechSynthesis.onvoiceschanged = pick;
        }

        function speakOut(text) {
            if (!state.voiceEnabled || !("speechSynthesis" in window)) return;
            const clean = text.replace(/\*[^*]*\*/g, "").replace(/[^\w\s.,!?'-]/g, "").trim();
            if (!clean) return;
            speechSynthesis.cancel();
            const utt = new SpeechSynthesisUtterance(clean);
            const stage = getStage();
            utt.pitch = stage.pitch || 1.4;
            utt.rate = 1.1;
            utt.volume = 0.9;
            if (ttsVoice) utt.voice = ttsVoice;
            speechSynthesis.speak(utt);
        }

        /* ─── SPEECH RECOGNITION ─── */
        let recognition = null;
        let isListening = false;

        function initSpeechRec() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return null;
            const rec = new SR();
            rec.lang = "en-US";
            rec.interimResults = false;
            rec.maxAlternatives = 1;
            rec.continuous = false;
            rec.onresult = (e) => {
                const text = e.results[0][0].transcript;
                const input = document.getElementById("chat-input");
                input.value = text;
                handleUserMessage(text);
                input.value = "";
                stopListening();
            };
            rec.onerror = (e) => {
                stopListening();
                if (e.error === "not-allowed" || e.error === "service-not-allowed") {
                    toast("Mic permission denied");
                } else if (e.error !== "no-speech" && e.error !== "aborted") {
                    toast("Voice error");
                }
            };
            rec.onend = () => stopListening();
            return rec;
        }

        function toggleListen() {
            if (!recognition) recognition = initSpeechRec();
            if (!recognition) { toast("Voice not supported here"); return; }
            if (isListening) { stopListening(); return; }
            try {
                recognition.start();
                isListening = true;
                document.getElementById("mic-btn").classList.add("listening");
                document.getElementById("chat-input").placeholder = "Listening...";
            } catch (e) { stopListening(); }
        }

        function stopListening() {
            isListening = false;

            const today = new Date().toDateString();

                const streak = (new Date(state.dailyLogin.last).getTime() + 86400000 > Date.now()) ?

                state.dailyLogin.streak = streak;
                state.dailyLogin.last = Date.now();
                state.dailyLogin.claimed = false;
                const bonus = Math.min(20 + streak * 2, 100);
                toast(`🌅 Day ${streak}! Claim ${bonus} coins!`, "coin");
                log("system", `Daily login day ${streak}`);
                if (!state.dailyLogin.claimed) {
                    state.dailyLogin.claimed = true;
                    earnCoins(bonus, true);
                    toast(`+${bonus} daily bonus!`, "coin");
                }
                save();

            updateUI();

        /* ─── WEATHER ─── */
        function updateWeather() {
            const now = Date.now();
            if (now - state.weather.changedAt > 1000 * 60 * 30) {
                let r = Math.random();
                let cum = 0;
                let chosen = WEATHERS[0];
                for (const wt of WEATHERS) {
                    cum += wt.chance;
                    if (r < cum) { chosen = wt; break; }
                }
                state.weather.id = chosen.id;
                state.weather.changedAt = now;
                save();
            }
            applyWeather();
        }

            const scene = document.getElementById("scene");
            scene.querySelectorAll(".rain-drop, .snowflake, .fog-overlay").forEach(el => el.remove());

                    drop.textContent = "💧";

                    drop.style.animationDelay = rand(0, 1.2) + "s";
                    drop.style.fontSize = rand(8, 14) + "px";
                    drop.style.opacity = rand(0.2, 0.5);
                    scene.appendChild(drop);

        /* ─── DRAGGABLE PET ─── */
        let isDragging = false;
        let dragOffsetX = 0,
            dragOffsetY = 0;
        let petX = 50,
            petY = 50;

        function initDraggable() {
            const wrap = document.getElementById("pet-wrap");
            const stage = document.getElementById("pet-stage");

            function getPos(e) {
                const rect = stage.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: ((clientX - rect.left) / rect.width) * 100, y: ((clientY - rect.top) / rect.height) * 100 };
            }

            function onStart(e) {
                e.preventDefault();
                const rect = stage.getBoundingClientRect();
                const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                const wrapRect = wrap.getBoundingClientRect();
                dragOffsetX = cx - (wrapRect.left - rect.left);
                dragOffsetY = cy - (wrapRect.top - rect.top);
                isDragging = true;
                wrap.classList.add("dragging");
            }

            function onMove(e) {
                if (!isDragging) return;
                e.preventDefault();
                const rect = stage.getBoundingClientRect();
                const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                const wrapRect = wrap.getBoundingClientRect();
                const wrapW = wrapRect.width;
                const wrapH = wrapRect.height;
                let x = ((cx - dragOffsetX) / rect.width) * 100;
                let y = ((cy - dragOffsetY) / rect.height) * 100;
                x = clamp(x, 0, 100 - (wrapW / rect.width) * 100);
                y = clamp(y, 0, 100 - (wrapH / rect.height) * 100);
                petX = x;
                petY = y;
                state.petX = x;
                state.petY = y;
                wrap.style.left = x + "%";
                wrap.style.top = y + "%";
            }

            function onEnd(e) {
                if (isDragging) {
                    isDragging = false;
                    wrap.classList.remove("dragging");
                    save();
                }
            }

            wrap.addEventListener("mousedown", onStart);
            wrap.addEventListener("touchstart", onStart, { passive: false });
            document.addEventListener("mousemove", onMove);
            document.addEventListener("touchmove", onMove, { passive: false });
            document.addEventListener("mouseup", onEnd);
            document.addEventListener("touchend", onEnd);
            document.addEventListener("touchcancel", onEnd);

            if (state.petX !== undefined) {
                petX = state.petX;
                petY = state.petY;
                wrap.style.left = petX + "%";
                wrap.style.top = petY + "%";
            } else {
                wrap.style.left = "50%";
                wrap.style.top = "50%";
                wrap.style.transform = "translate(-50%, -50%)";
                petX = 50;
                petY = 50;
            }
        }

        function renderPlaymates() {

                label.className = "mate-label";
                label.textContent = pm.name;
                div.appendChild(label);
                const angle = (idx / state.playmates.length) * Math.PI * 2 - Math.PI / 2;
                const dist = 60 + idx * 8;
                div.style.left = `calc(${petX}% + ${Math.cos(angle) * dist}px)`;
                div.style.top = `calc(${petY}% + ${Math.sin(angle) * dist}px)`;
                div.style.transform = "translate(-50%, -50%)";
                div.style.fontSize = Math.max(20, 34 - idx * 2) + "px";
                div.style.zIndex = 5 - idx;
                scene.appendChild(div);

        function generatePhotoData() {
            const canvas = document.createElement("canvas");
            canvas.width = 300;
            canvas.height = 300;
            const ctx = canvas.getContext("2d");
            const c = state.color || { body: "#c9e8b5", outline: "#2d4a1f" };
            ctx.fillStyle = "#d5f0c2";
            ctx.fillRect(0, 0, 300, 300);
            ctx.fillStyle = c.body;
            ctx.beginPath();
            ctx.ellipse(150, 150, 80, 85, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = c.outline;
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.fillStyle = c.outline;
            ctx.font = "30px sans-serif";
            ctx.fillText("🐾", 120, 170);
            ctx.font = "16px sans-serif";
            ctx.fillStyle = "#1a2b0f";
            ctx.fillText(state.name, 110, 240);
            ctx.font = "12px sans-serif";
            ctx.fillStyle = "#666";
            ctx.fillText(new Date().toLocaleDateString(), 110, 265);
            return canvas.toDataURL("image/png");
        }

        /* ─── HUNT ─── */
        let huntGame = null;

        function startHunt() {
            huntGame = { score: 0, round: 0, maxRounds: 12, running: true, timer: null };
            openModal("🏹 Hunt!", `
            <div class="game-score">
              <span>Score: <span id="h-score">0</span></span>
              <span>Round: <span id="h-round">0</span>/${huntGame.maxRounds}</span>
            </div>
            <div class="hunt-area" id="hunt-area"></div>
            <p style="font-size:11px; color:#888; text-align:center;">Tap the hidden creatures!</p>
          `);
            setTimeout(nextHuntRound, 400);
        }

        function nextHuntRound() {
            if (!huntGame || !huntGame.running) return;
            const area = document.getElementById("hunt-area");
            if (!area) { huntGame = null; return; }
            if (huntGame.round >= huntGame.maxRounds) { endHunt(); return; }
            huntGame.round++;
            document.getElementById("h-round").textContent = huntGame.round;
            const count = randInt(2, 4);
            for (let i = 0; i < count; i++) {
                const el = document.createElement("div");
                el.className = "hunt-item";
                el.textContent = HUNT_ITEMS[randInt(0, HUNT_ITEMS.length - 1)];
                el.style.left = rand(5, 85) + "%";
                el.style.top = rand(5, 85) + "%";
                el.style.fontSize = rand(22, 36) + "px";
                let caught = false;
                el.onclick = (e) => {
                    e.stopPropagation();
                    if (caught) return;
                    caught = true;
                    el.classList.add("pop");
                    huntGame.score++;
                    document.getElementById("h-score").textContent = huntGame.score;
                    chirp("hunt");
                    setTimeout(() => el.remove(), 300);
                };
                area.appendChild(el);
                setTimeout(() => { if (!caught && el.parentNode) el.remove(); }, 2500);
            }
            huntGame.timer = setTimeout(() => {
                if (huntGame && huntGame.running) {
                    area.querySelectorAll(".hunt-item").forEach(el => el.remove());
                    nextHuntRound();
                }
            }, 2800);
        }

        function endHunt() {
            if (!huntGame) return;
            const s = huntGame.score;
            const reward = s * 4 + 5;
            state.huntStats.caught = (state.huntStats.caught || 0) + s;
            state.huntStats.total = (state.huntStats.total || 0) + huntGame.round;
            earnCoins(reward);
            state.fun = Math.min(100, state.fun + s * 2);
            save();
            huntGame = null;
            checkAchievements();
            openModal("🏹 Hunt over!", `
            <p style="text-align:center; font-size:16px;">Caught <b>${s}</b> creatures!</p>
            <p style="text-align:center; font-size:20px; color:#b58900;">+${reward} 💰</p>
            <p style="text-align:center; font-size:12px; color:#888;">Total: ${state.huntStats.caught}</p>
            <div class="modal-actions">
              <button class="btn-primary" id="h-again">Hunt again</button>
              <button class="btn-secondary" onclick="closeModal()">Done</button>
            </div>
          `);
            setTimeout(() => { document.getElementById("h-again").onclick = () => { closeModal();
                    startHunt(); }; }, 50);
        }

        /* ─── ACTIONS ─── */
        function feed(foodId) {
            if (state.sleeping) return sayShort("... zzz");
            const food = foodId ? SHOP_FOODS.find(f => f.id === foodId) : SHOP_FOODS.find(f => f.id === "apple");
            const useInventory = food && state.inventory[food.id] > 0;
            if (!useInventory) {
                if (state.hunger > 92) { speak("I'm too full!"); state.fun = Math.max(0, state.fun - 3); return; }
                if (!state.inventory.apple) state.inventory.apple = 1;
                return feed("apple");
            }
            state.inventory[food.id]--;
            if (state.inventory[food.id] <= 0) delete state.inventory[food.id];
            for (const [k, v] of Object.entries(food.effects)) {
                state[k] = Math.min(100, state[k] + v);
            }

        /* ─── CHAT ─── */
        function handleUserMessage(rawText) {
            const text = rawText.trim();
            if (!text) return;
            log("me", text);
            if (state.pendingTrick) { finishTraining(text); return; }
            const lower = text.toLowerCase();
            for (const word of Object.keys(state.tricks)) {
                if (lower.includes(word)) { performTrick(word); return; }
            }
            learn(text);
            earnCoins(1, true);
            const response = generateResponse(text);
            setTimeout(() => speak(response, 4500), 400);
        }

        function learn(text) {
            state.totalMessages++;
            state.traits.talkative = Math.min(100, state.traits.talkative + 0.5);
            state.phrases.unshift(text);
            if (state.phrases.length > 30) state.phrases.pop();
            const words = text.toLowerCase().replace(/[^a-z0-9\s']/g, "").split(/\s+/);
            for (const w of words) {
                if (w.length < 3 || STOPWORDS.has(w)) continue;
                if (!state.vocab[w]) state.vocab[w] = { count: 0, lastSeen: 0 };
                state.vocab[w].count++;
                state.vocab[w].lastSeen = Date.now();
            }
            const lower = text.toLowerCase();
            if (AFFECTION_WORDS.some(w => lower.includes(w))) {
                state.traits.affectionate = Math.min(100, state.traits.affectionate + 1);
                state.fun = Math.min(100, state.fun + 5);
                spawnHearts(2);
            }
            if (BAD_WORDS.some(w => lower.includes(w))) {
                state.traits.affectionate = Math.max(0, state.traits.affectionate - 2);
                state.fun = Math.max(0, state.fun - 10);
                setMoodOverride("sad", 3000);
            }
            checkAchievements();
            save();
        }

        function generateResponse(text) {
            const t = text.toLowerCase();
            if (state.sleeping) return Math.random() < 0.5 ? "... zzz ..." : "mmm... sleeping...";
            if (state.health < 30) return pickReply(["*coughs* I don't feel good...", "I need medicine..."]);
            if (state.hunger < 20) return pickReply(["I'm so hungry!!", "Feed me? Please?"]);
            if (state.thirst < 20) return pickReply(["My mouth is dry...", "Water? Please?"]);
            if (state.clean < 15) return pickReply(["Ew I'm dirty...", "I need a bath"]);
            if (state.energy < 15) return pickReply(["So... tired...", "Yaaaawn"]);
            if (GREETING_WORDS.some(w => t.startsWith(w) || t.split(/\s+/).includes(w))) {
                return pickReply([`Hi friend!`, "Hello!", "Hey you!", `You're here!`]);
            }
            if (t.includes("love you") || t.includes("love u")) {
                state.traits.affectionate = Math.min(100, state.traits.affectionate + 3);
                spawnHearts(3);
                setMoodOverride("loved", 3000);
                return pickReply(["I love you too!!", "💕💕💕", "You make me so happy!"]);
            }
            if (t.includes("your name") || t.includes("who are you")) {
                return `I'm ${state.name}! Your ${getStage().name.toLowerCase()} pet!`;
            }
            if (t.includes("how are you") || t.includes("how do you feel")) return moodDescription();
            if (t.includes("what") && (t.includes("do") || t.includes("want"))) return whatDoIWant();
            if (t.includes("sing") || t.includes("song")) return generateSong();
            if (t.includes("play")) return state.energy > 30 ? pickReply(["YES PLAY!", "Fun time!"]) : "Too tired to play...";
            if (t.includes("park") || t.includes("walk")) return pickReply(["Ooh the park?", "I love outside!"]);
            if (t.includes("photo") || t.includes("picture") || t.includes("camera")) return "📸 Say cheese!";
            if (t.includes("journal") || t.includes("note") || t.includes("remember")) {
                return "📓 I can keep notes for you! Tap the 📓 button!";
            }
            if (t.includes("shooter") || t.includes("game") || t.includes("play")) {
                return "🚀 Play Shooter! Tap the 🚀 button!";
            }
            if (t.endsWith("?") || QUESTIONS.some(q => t.startsWith(q))) return generateQuestionResponse();
            return generateChatty(text);
        }

        function moodDescription() {
            const m = getMood();
            const map = {
                happy: ["I feel great!", "Really good today!"],
                excited: ["Amazing!!! So much energy!!", "SO GOOD!"],
                loved: ["Loved! So loved!", "My heart is full"],
                sad: ["A little sad...", "Kinda down..."],
                hungry: ["Hungry..."],
                sick: ["Not well..."],
                idle: ["I'm okay", "Just chill", "Meh, alright"],
                sleeping: ["Zzz..."]
            };
            return pickReply(map[m] || ["Just being me"]);
        }

        function whatDoIWant() {
            const needs = [];
            if (state.hunger < 50) needs.push("food");
            if (state.thirst < 50) needs.push("water");
            if (state.clean < 50) needs.push("a bath");
            if (state.fun < 50) needs.push("to play");
            if (state.energy < 40) needs.push("sleep");
            if (!needs.length) return pickReply(["Just hang out with you!", "Cuddles maybe?"]);
            if (needs.length === 1) return `I want ${needs[0]}!`;
            return `Maybe ${needs.slice(0, 2).join(" and ")}?`;
        }

        function generateQuestionResponse() {
            const w = randomLearnedWord();
            return pickReply(["Hmm... I don't know!", "Good question!", w ? `Maybe ${w}?` : "You tell me!",
                "I'm just a little pet...", w || "Hmm..."
            ]);
        }

        function generateChatty(userText) {
            const words = userText.toLowerCase().replace(/[^a-z0-9\s']/g, " ").split(/\s+/).filter(w => w.length > 2 && !
                STOPWORDS.has(w));
            const echo = words[Math.floor(Math.random() * words.length)] || randomLearnedWord() || "you";
            const templates = [
                `${echo}? Tell me more!`, `Ooh, ${echo}!`, `${echo}!!`,
                "Mmhmm mmhmm", "*tilts head*", `I like when you say "${echo}"`,
                "Really??", "Wow!", `Say ${echo} again!`
            ];
            if (state.traits.talkative > 60) {
                const learned = Object.keys(state.vocab).filter(w => state.vocab[w].count >= 3 && w !== echo)
                    .sort((a, b) => state.vocab[b].count - state.vocab[a].count);
                if (learned.length) {
                    const other = learned[Math.floor(Math.random() * Math.min(5, learned.length))];
                    templates.push(`${echo} and ${other}? Interesting!`, `I remember when you said ${other}`);
                }
            }
            return pickReply(templates);
        }

        function generateSpontaneous() {
            const m = getMood();
            if (m === "sad") return pickReply(["*sighs*", "Notice me?", "I'm lonely"]);
            if (m === "hungry") return pickReply(["*tummy rumbles*", "Snacks?"]);
            if (m === "excited") return pickReply(["Hiiii!!", "Look at me!"]);
            const w = randomLearnedWord();
            if (w && Math.random() < 0.5) return pickReply([`${w}!`, `${w}...`, `Thinking about ${w}`]);
            return pickReply(["Hmm...", "*whistles*", "La la la", "*hums*", "Boop!"]);
        }

        function generateSong() {
            const words = Object.entries(state.vocab).sort((a, b) => b[1].count - a[1].count).slice(0, 6).map(x => x[0]);
            if (!words.length) return "La la la... la la la!";
            const lyrics = [];
            for (let i = 0; i < 4; i++) {
                lyrics.push(words[Math.floor(Math.random() * words.length)]);
            }
            return `🎵 ${lyrics.join(" ")} 🎵`;
        }

        /* ─── TRICKS ─── */
        function performTrick(word) {
            const t = state.tricks[word];
            if (!t) return;
            const successChance = 0.4 + t.level * 0.2;
            if (Math.random() > successChance) {
                speak(pickReply(["Hmm... what was that?", "I forgot...", "*confused*"]));
                return;
            }
            const action = TRICK_ACTIONS[t.action];
            if (!action) { speak("*confused*"); return; }
            const wrap = document.getElementById("pet-wrap");
            if (action.class) {
                wrap.classList.add(action.class);
                setTimeout(() => wrap.classList.remove(action.class), 1500);
            }
            if (action.handler) action.handler();
            else speak(`${action.emoji} ${action.name}!`);
            chirp("happy");
            spawnHearts(1);
            t.level = Math.min(3, t.level + 0.1);
            state.tricksLearned = (state.tricksLearned || 0) + 1;
            earnCoins(2);
            checkAchievements();
            save();
        }

        function startTraining() {
            openModal("🎓 Train a trick", `
            <p>Pick an action, then teach me a command word.</p>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:6px; margin-bottom:10px;">
              ${Object.entries(TRICK_ACTIONS).map(([id, a]) => `
                <button class="menu-item" data-trick="${id}" style="flex-direction:column; text-align:center; padding:10px 4px; gap:2px; font-size:11px;">
                  <span style="font-size:26px;">${a.emoji}</span>
                  <span>${a.name}</span>
                </button>`).join("")}
            </div>
            <p style="font-size:10px; color:#888;">Trained: ${Object.entries(state.tricks).map(([w,t])=>`"${w}" → ${t.action} (lvl ${Math.floor(t.level)})`).join(", ") || "none"}</p>
          `);
            setTimeout(() => {
                document.querySelectorAll("[data-trick]").forEach(btn => {
                    btn.onclick = () => {
                        const trickId = btn.dataset.trick;
                        closeModal();
                        promptTrickWord(trickId);
                    };
                });
            }, 50);
        }

        function promptTrickWord(trickId) {
            const action = TRICK_ACTIONS[trickId];
            openModal("Teach the word", `
            <p>Type the word you'll say to make me <b>${action.name}</b>.</p>
            <input type="text" id="trick-word-input" maxlength="20" placeholder="${trickId}" />
            <div class="modal-actions">
              <button class="btn-secondary" id="tw-cancel">Cancel</button>
              <button class="btn-primary" id="tw-ok">Teach</button>
            </div>
          `);
            setTimeout(() => {
                const input = document.getElementById("trick-word-input");
                input.focus();
                document.getElementById("tw-cancel").onclick = closeModal;
                document.getElementById("tw-ok").onclick = () => {
                    const w = input.value.trim().toLowerCase();
                    if (!w) return;
                    state.tricks[w] = { action: trickId, level: 0 };
                    state.tricksLearned = (state.tricksLearned || 0) + 1;
                    save();
                    closeModal();
                    speak(`New word! "${w}" means ${action.name}!`);
                    chirp("love");
                    toast(`Learned command: "${w}"`);
                    checkAchievements();
                };
                input.onkeydown = (e) => { if (e.key === "Enter") document.getElementById("tw-ok").click(); };
            }, 50);
        }

        function finishTraining(text) { state.pendingTrick = null;
            save(); }

        /* ─── SHOP ─── */
        let shopTab = "foods";

        function openShop() {
            const pmItems = PLAYMATES.map(p => {
                const owned = state.playmates.some(m => m.id === p.id);
                return `<div class="shop-item ${owned?'owned':''}" data-playmate="${p.id}">
              <div class="item-icon">${p.icon}</div>
              <div class="item-name">${p.name}</div>
              <div class="item-price">${owned ? "owned" : `${p.price} 💰`}</div>
            </div>`;
            }).join("");

            openModal("🛍 Shop", `
            <div class="shop-tabs">
              <button class="shop-tab ${shopTab==='foods'?'active':''}" data-tab="foods">🍎 Foods</button>
              <button class="shop-tab ${shopTab==='accessories'?'active':''}" data-tab="accessories">🎩 Gear</button>
              <button class="shop-tab ${shopTab==='playmates'?'active':''}" data-tab="playmates">🐾 Friends</button>
            </div>
            <div id="shop-list-container">${renderShopList()}</div>
          `);

                document.querySelectorAll(".shop-tab").forEach(t => {

        function renderShopList() {
            if (shopTab === "foods") {
                return `<div class="shop-list">${SHOP_FOODS.map(f => {
              const owned = state.inventory[f.id] || 0;
              return `<div class="shop-item ${owned?'owned':''}" data-food="${f.id}">
                <div class="item-icon">${f.icon}</div>
                <div class="item-name">${f.name}</div>
                <div class="item-price">${owned ? `x${owned}` : `${f.price} 💰`}</div>
              </div>`;
            }).join("")}</div>`;
            } else if (shopTab === "accessories") {
                return `<div class="shop-list">${SHOP_ACCESSORIES.map(a => {
              const owned = state.ownedAccessories.includes(a.id);
              const equipped = state.equipped[a.slot] === a.id;
              return `<div class="shop-item ${owned?'owned':''} ${equipped?'equipped':''}" data-acc="${a.id}">
                <div class="item-icon">${a.icon}</div>
                <div class="item-name">${a.name}</div>
                <div class="item-price">${owned ? (equipped ? "worn" : "tap to wear") : `${a.price} 💰`}</div>
              </div>`;
            }).join("")}</div>`;
            } else {
                return `<div class="shop-list">${PLAYMATES.map(p => {
              const owned = state.playmates.some(m => m.id === p.id);
              return `<div class="shop-item ${owned?'owned':''}" data-playmate="${p.id}">
                <div class="item-icon">${p.icon}</div>
                <div class="item-name">${p.name}</div>
                <div class="item-price">${owned ? "owned" : `${p.price} 💰`}</div>
              </div>`;
            }).join("")}</div>`;
            }
        }

        function bindShopItems() {
            document.querySelectorAll("[data-food]").forEach(el => {
                el.onclick = () => {
                    const id = el.dataset.food;
                    const f = SHOP_FOODS.find(x => x.id === id);
                    if (state.inventory[id] > 0) { closeModal();
                        feed(id); } else {
                        if (spendCoins(f.price)) {
                            state.inventory[id] = (state.inventory[id] || 0) + 1;
                            save();
                            toast(`Bought ${f.name}!`);
                            openShop();
                        }
                    }
                };
            });
            document.querySelectorAll("[data-acc]").forEach(el => {
                el.onclick = () => {
                    const id = el.dataset.acc;
                    const a = SHOP_ACCESSORIES.find(x => x.id === id);
                    if (state.ownedAccessories.includes(id)) {
                        if (state.equipped[a.slot] === id) { state.equipped[a.slot] = null; } else { state.equipped[a
                                .slot] = id; }
                        save();
                        updateUI();
                        chirp("beep");
                        openShop();
                    } else {
                        if (spendCoins(a.price)) {
                            state.ownedAccessories.push(id);
                            state.equipped[a.slot] = id;
                            save();
                            updateUI();
                            toast(`Got ${a.name}!`);
                            chirp("love");
                            openShop();
                        }
                    }
                };
            });
            document.querySelectorAll("[data-playmate]").forEach(el => {
                el.onclick = () => { buyPlaymate(el.dataset.playmate); };
            });
        }

        function openGames() {
            openModal("🎮 Mini-games", `

        let catchGame = null;

        function playCatch() {
            catchGame = { score: 0, misses: 0, round: 0, running: true };
            openModal("🎯 Catch the treat", `
            <div class="game-score">
              <span>Score: <span id="c-score">0</span></span>
              <span>Round: <span id="c-round">0</span>/10</span>
            </div>
            <div class="game-area" id="catch-area"></div>
            <p style="font-size:11px; color:#888; text-align:center;">Tap treats before they fall!</p>
          `);
            setTimeout(nextCatchRound, 400);
        }

        function nextCatchRound() {
            if (!catchGame || !catchGame.running) return;
            const area = document.getElementById("catch-area");
            if (!area) { catchGame = null; return; }
            if (catchGame.round >= 10) { endCatch(); return; }
            catchGame.round++;
            document.getElementById("c-round").textContent = catchGame.round;
            const treat = document.createElement("div");
            treat.className = "game-treat";
            treat.textContent = ["🍎", "🍬", "🍰", "🍓", "🍩", "🍪", "🍭"][Math.floor(Math.random() * 7)];
            treat.style.left = (Math.random() * 80 + 5) + "%";
            let caught = false;
            treat.onclick = () => {
                if (caught) return;
                caught = true;
                catchGame.score++;
                document.getElementById("c-score").textContent = catchGame.score;
                treat.remove();
                setTimeout(nextCatchRound, 350);
            };
            area.appendChild(treat);
            setTimeout(() => { if (!caught && treat.parentNode) { treat.remove();
                    catchGame.misses++;
                    setTimeout(nextCatchRound, 350); } }, 2200);
        }

        function endCatch() {
            const s = catchGame.score;
            catchGame = null;
            const reward = s * 3 + 5;
            earnCoins(reward);
            state.fun = Math.min(100, state.fun + s * 2);
            save();
            openModal("Game over!", `
            <p style="text-align:center; font-size:15px;">Caught <b>${s}</b> treats!</p>
            <p style="text-align:center; font-size:20px; color:#b58900;">+${reward} 💰</p>
            <div class="modal-actions">

        let memGame = null;

        function playMemory() {
            const icons = ["🍎", "🍰", "🍕", "🎾", "🎨", "💎", "🐱", "🌈"];
            const cards = [...icons.slice(0, 6)].concat([...icons.slice(0, 6)]).sort(() => Math.random() - 0.5);
            memGame = { cards, flipped: [], matched: [], moves: 0 };
            openModal("🃏 Memory match", `
            <div class="game-score">
              <span>Moves: <span id="m-moves">0</span></span>
              <span>Pairs: <span id="m-pairs">0</span>/6</span>
            </div>
            <div class="memory-grid" id="mem-grid">
              ${cards.map((c, i) => `<button class="memory-card" data-idx="${i}" data-icon="${c}"></button>`).join("")}
            </div>
          `);
            setTimeout(() => {
                document.querySelectorAll(".memory-card").forEach(card => {
                    card.onclick = () => memFlip(parseInt(card.dataset.idx));
                });
            }, 50);
        }

        function memFlip(idx) {
            if (!memGame) return;
            if (memGame.matched.includes(idx) || memGame.flipped.includes(idx)) return;
            if (memGame.flipped.length >= 2) return;
            const card = document.querySelector(`[data-idx="${idx}"]`);
            card.textContent = memGame.cards[idx];
            card.classList.add("flipped");
            memGame.flipped.push(idx);
            if (memGame.flipped.length === 2) {
                memGame.moves++;
                document.getElementById("m-moves").textContent = memGame.moves;
                const [a, b] = memGame.flipped;
                if (memGame.cards[a] === memGame.cards[b]) {
                    memGame.matched.push(a, b);
                    document.querySelectorAll(`[data-idx="${a}"], [data-idx="${b}"]`).forEach(c => c.classList.add("matched"));
                    document.getElementById("m-pairs").textContent = memGame.matched.length / 2;
                    memGame.flipped = [];
                    if (memGame.matched.length === memGame.cards.length) { setTimeout(endMemory, 600); }
                } else {
                    setTimeout(() => {
                        document.querySelectorAll(`[data-idx="${a}"], [data-idx="${b}"]`).forEach(c => {
                            c.classList.remove("flipped");
                            c.textContent = "";
                        });
                        memGame.flipped = [];
                    }, 800);
                }
            }
        }

        function endMemory() {
            const moves = memGame.moves;
            memGame = null;
            const reward = Math.max(10, 50 - moves * 2);
            earnCoins(reward);
            state.fun = Math.min(100, state.fun + 15);
            save();
            openModal("You won!", `

            </div>
          `);
            setTimeout(() => { document.getElementById("m-again").onclick = () => { closeModal();

        }

                    const tag = e.target.tagName?.toLowerCase() || '';
                    if (tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.isContentEditable) {
                        return; // ✅ spacebar works in text fields
