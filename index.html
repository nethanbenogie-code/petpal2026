<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#f7c5cc" />
    <title>PetPal — AI Companion</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <style>
        /* ─── ROOT ─── */
        :root {
            --bg: #f7c5cc;
            --shell: #ffe0e5;
            --shell-2: #f4a8b3;
            --screen: #c9e8b5;
            --ink: #1a2b0f;
            --btn: #ffb3c1;
            --btn-hover: #ff8fa6;
            --btn-active: #e07688;
            --gold: #f7d774;
            --danger: #e56b6f;
            --ok: #7bc47f;
            --shadow: 0 8px 32px rgba(200, 80, 110, 0.25);
            --radius: 20px;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        html,
        body {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: radial-gradient(circle at 30% 20%, #ffd6dc, var(--bg));
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            user-select: none;
            -webkit-user-select: none;
        }
        .device {
            width: 100%;
            max-width: 420px;
            height: 100dvh;
            max-height: 900px;
            background: linear-gradient(160deg, var(--shell), var(--shell-2));
            border-radius: 32px;
            padding: 14px 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.08), inset 0 2px 0 rgba(255, 255, 255, 0.5), var(--shadow);
            position: relative;
            overflow: hidden;
        }
        /* ─── TOPBAR ─── */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2px;
            font-size: 12px;
            font-weight: 700;
            color: #7a3a48;
            flex-shrink: 0;
        }
        .topbar .name-box {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .badge {
            background: rgba(255, 255, 255, 0.5);
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 10px;
        }
        .coin-badge {
            background: linear-gradient(180deg, #ffe58a, var(--gold));
            color: #6b4a00;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 3px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }
        .top-btns {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .icon-btn {
            background: rgba(255, 255, 255, 0.5);
            border: none;
            color: #7a3a48;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
        }
        .icon-btn:active {
            transform: scale(0.92);
        }
        .icon-btn.on {
            background: var(--btn-active);
            color: white;
        }
        /* ─── SCREEN ─── */
        .screen {
            background: linear-gradient(180deg, #d5f0c2, var(--screen));
            border-radius: var(--radius);
            padding: 10px;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.15), inset 0 -1px 0 rgba(255, 255, 255, 0.4);
            position: relative;
            overflow: hidden;
            transition: background 1.2s ease;
        }
        .screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.02) 0, rgba(0, 0, 0, 0.02) 1px, transparent 1px, transparent 3px);
            pointer-events: none;
        }
        /* ─── STATS ─── */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            font-size: 9px;
            font-weight: 700;
            color: var(--ink);
            flex-shrink: 0;
        }
        .stat {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .stat-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-bar {
            height: 5px;
            background: rgba(0, 0, 0, 0.12);
            border-radius: 4px;
            overflow: hidden;
        }
        .stat-fill {
            height: 100%;
            background: var(--ink);
            border-radius: 4px;
            transition: width 0.4s ease, background 0.3s;
        }
        .stat-fill.low {
            background: var(--danger);
        }
        .stat-fill.mid {
            background: #b58900;
        }
        /* ─── PET STAGE ─── */
        .pet-stage {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.15);
        }
        .pet-scene {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .ground {
            position: absolute;
            bottom: 6px;
            left: 10%;
            right: 10%;
            height: 4px;
            background: rgba(0, 0, 0, 0.12);
            border-radius: 50%;
            filter: blur(2px);
            pointer-events: none;
        }
        #pet-wrap {
            position: absolute;
            cursor: grab;
            touch-action: none;
            transition: filter 0.2s;
            z-index: 10;
            width: 55%;
            max-width: 180px;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }
        #pet-wrap:active {
            cursor: grabbing;
        }
        #pet-wrap.dragging {
            filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.3));
            transition: filter 0.1s;
        }
        #pet {
            width: 100%;
            height: 100%;
            animation: idle 3s ease-in-out infinite;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.15));
            pointer-events: none;
        }
        #pet-wrap.sleeping #pet {
            animation: sleep 4s ease-in-out infinite;
        }
        #pet-wrap.happy #pet {
            animation: bounce 0.8s ease-in-out infinite;
        }
        #pet-wrap.sad #pet {
            animation: sway 4s ease-in-out infinite;
            opacity: 0.85;
        }
        #pet-wrap.playing #pet {
            animation: bounce 0.5s ease-in-out infinite;
        }
        #pet-wrap.eating #pet {
            animation: eat 0.4s ease-in-out infinite;
        }
        #pet-wrap.bathing #pet {
            animation: shake 0.3s ease-in-out infinite;
        }
        #pet-wrap.spin #pet {
            animation: spin 1s ease-in-out;
        }
        #pet-wrap.jump #pet {
            animation: jump 0.8s ease-in-out;
        }
        #pet-wrap.dance #pet {
            animation: dance 1.5s ease-in-out;
        }
        @keyframes idle {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-16px) scale(1.05);
            }
        }
        @keyframes sleep {
            0%,
            100% {
                transform: scale(1, 1);
            }
            50% {
                transform: scale(1.03, 0.97);
            }
        }
        @keyframes sway {
            0%,
            100% {
                transform: rotate(-3deg);
            }
            50% {
                transform: rotate(3deg);
            }
        }
        @keyframes eat {
            0%,
            100% {
                transform: scale(1, 1);
            }
            50% {
                transform: scale(1.05, 0.95);
            }
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(-3px);
            }
            50% {
                transform: translateX(3px);
            }
        }
        @keyframes spin {
            0% {
                transform: rotate(0);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        @keyframes jump {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-40px);
            }
        }
        @keyframes dance {
            0%,
            100% {
                transform: rotate(0) translateY(0);
            }
            25% {
                transform: rotate(-15deg) translateY(-6px);
            }
            50% {
                transform: rotate(0) translateY(-10px);
            }
            75% {
                transform: rotate(15deg) translateY(-6px);
            }
        }
        .playmate {
            position: absolute;
            pointer-events: none;
            z-index: 5;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0.9;
            width: 40px;
            height: 40px;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.15));
            animation: floatMate 3s ease-in-out infinite;
        }
        .playmate .mate-label {
            position: absolute;
            bottom: -16px;
            font-size: 7px;
            font-weight: 700;
            color: rgba(0, 0, 0, 0.5);
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.6);
            padding: 1px 6px;
            border-radius: 4px;
        }
        @keyframes floatMate {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }
        .bubble {
            position: absolute;
            top: 6px;
            left: 8px;
            right: 8px;
            background: white;
            color: var(--ink);
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 12px;
            line-height: 1.3;
            font-weight: 600;
            box-shadow: 0 3px 0 rgba(0, 0, 0, 0.15);
            border: 2px solid var(--ink);
            max-width: 90%;
            margin: 0 auto;
            z-index: 20;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s;
            pointer-events: none;
        }
        .bubble.show {
            opacity: 1;
            transform: translateY(0);
        }
        .bubble::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border: 6px solid transparent;
            border-top-color: var(--ink);
        }
        .bubble::before {
            content: "";
            position: absolute;
            bottom: -7px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border: 5px solid transparent;
            border-top-color: white;
            z-index: 1;
        }
        .mood-tag,
        .stage-info,
        .time-tag {
            position: absolute;
            bottom: 4px;
            font-size: 8px;
            color: rgba(0, 0, 0, 0.4);
            font-weight: 700;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 2;
        }
        .mood-tag {
            left: 6px;
        }
        .stage-info {
            right: 6px;
        }
        .time-tag {
            left: 50%;
            transform: translateX(-50%);
        }
        .zzz {
            position: absolute;
            top: 8%;
            right: 20%;
            font-size: 22px;
            font-weight: 700;
            color: var(--ink);
            opacity: 0;
            animation: zzz 3s ease-in-out infinite;
            pointer-events: none;
            z-index: 3;
        }
        @keyframes zzz {
            0% {
                opacity: 0;
                transform: translate(0, 0);
            }
            30% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(20px, -30px);
            }
        }
        .hearts {
            position: absolute;
            pointer-events: none;
            inset: 0;
            z-index: 4;
        }
        .heart {
            position: absolute;
            font-size: 18px;
            animation: rise 1.5s ease-out forwards;
        }
        @keyframes rise {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px) scale(1.2);
            }
        }
        /* ─── ACTIONS ─── */
        .actions {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            flex-shrink: 0;
        }
        .action {
            background: linear-gradient(180deg, var(--btn), var(--btn-hover));
            border: none;
            border-radius: 10px;
            padding: 6px 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            color: #4a1424;
            font-family: inherit;
            font-size: 8px;
            font-weight: 700;
            box-shadow: 0 3px 0 var(--btn-active), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
            letter-spacing: 0.2px;
        }
        .action:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 var(--btn-active), inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }
        .action-icon {
            font-size: 18px;
            line-height: 1;
        }
        /* ─── CHAT BAR ─── */
        .chat-bar {
            display: flex;
            gap: 5px;
            align-items: center;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 999px;
            padding: 3px 3px 3px 12px;
            flex-shrink: 0;
        }
        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 13px;
            color: var(--ink);
            padding: 6px 0;
            min-width: 0;
        }
        .chat-input::placeholder {
            color: rgba(0, 0, 0, 0.35);
        }
        .chat-btn {
            background: var(--ink);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.15s;
        }
        .chat-btn:active {
            transform: scale(0.92);
        }
        .chat-btn.mic {
            background: #d64545;
        }
        .chat-btn.mic.listening {
            background: #e56b6f;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }
        .log {
            max-height: 40px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            padding: 3px 8px;
            font-size: 10px;
            color: #333;
            line-height: 1.3;
            display: flex;
            flex-direction: column;
            gap: 1px;
            flex-shrink: 0;
        }
        .log-entry.me {
            color: #7a3a48;
            font-weight: 600;
        }
        .log-entry.pet {
            color: #1a5a2b;
            font-weight: 600;
        }
        .log-entry.system {
            font-style: italic;
            color: #888;
        }
        /* scene backgrounds */
        .park-bg {
            background: linear-gradient(180deg, #a0d8ef 0%, #a0d8ef 55%, #7bc47f 55%, #7bc47f 100%);
        }
        .bath-bg {
            background: linear-gradient(180deg, #d0edf7, #a0d8ef);
        }
        .night-bg {
            background: linear-gradient(180deg, #1a2b52, #2b3a52);
        }
        .night-bg .stat,
        .night-bg .mood-tag,
        .night-bg .stage-info,
        .night-bg .time-tag {
            color: #ddd;
        }
        .dawn-bg {
            background: linear-gradient(180deg, #ffb99f 0%, #ffd6a5 50%, #c9e8b5 100%);
        }
        .dusk-bg {
            background: linear-gradient(180deg, #7a5c8a 0%, #d67a6a 50%, #8ac273 100%);
        }
        .dusk-bg .stat,
        .dusk-bg .mood-tag,
        .dusk-bg .stage-info,
        .dusk-bg .time-tag {
            color: #eee;
        }
        .beach-bg {
            background: linear-gradient(180deg, #fde8c8 0%, #fde8c8 50%, #7bc4f0 50%, #7bc4f0 100%);
        }
        .forest-bg {
            background: linear-gradient(180deg, #a8d5a2 0%, #5a8f4a 100%);
        }
        .city-bg {
            background: linear-gradient(180deg, #b8c6d4 0%, #6a7a8a 100%);
        }
        .mountain-bg {
            background: linear-gradient(180deg, #e8edf0 0%, #b8c8d8 40%, #7a9a7a 100%);
        }
        .space-bg {
            background: linear-gradient(180deg, #0a0a2a 0%, #1a1a4a 100%);
        }
        .space-bg .stat,
        .space-bg .mood-tag,
        .space-bg .stage-info,
        .space-bg .time-tag {
            color: #eee;
        }
        .snow-bg {
            background: linear-gradient(180deg, #e8f0f8 0%, #d0e0f0 100%);
        }
        .rain-bg {
            background: linear-gradient(180deg, #6a7a8a 0%, #4a5a6a 100%);
        }
        .rain-bg .stat,
        .rain-bg .mood-tag,
        .rain-bg .stage-info,
        .rain-bg .time-tag {
            color: #eee;
        }
        .decor {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }
        .star {
            position: absolute;
            color: white;
            font-size: 10px;
            opacity: 0.7;
            animation: twinkle 2s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.2;
            }
            50% {
                opacity: 1;
            }
        }
        .rain-drop {
            position: absolute;
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            animation: rainFall 1.2s linear infinite;
        }
        @keyframes rainFall {
            0% {
                transform: translateY(-20px);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(100%);
                opacity: 0;
            }
        }
        .snowflake {
            position: absolute;
            color: white;
            font-size: 12px;
            opacity: 0.8;
            animation: snowFall 3s linear infinite;
        }
        @keyframes snowFall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(100%) rotate(360deg);
                opacity: 0;
            }
        }
        .flash {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 25;
            border-radius: var(--radius);
        }
        .flash.on {
            animation: flash 0.4s ease-out;
        }
        @keyframes flash {
            0% {
                opacity: 0.8;
            }
            100% {
                opacity: 0;
            }
        }
        .toast {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--ink);
            color: white;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s;
            z-index: 40;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.coin {
            background: var(--gold);
            color: #6b4a00;
        }
        .toast.achievement {
            background: #4a8ec4;
            color: white;
        }
        /* ─── MODAL ─── */
        .modal-bg {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 32px;
            padding: 16px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .modal-bg.show {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 20px;
            padding: 16px;
            width: 100%;
            max-width: 340px;
            max-height: 85%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalPop 0.3s ease-out;
        }
        @keyframes modalPop {
            0% {
                transform: scale(0.9) translateY(20px);
                opacity: 0;
            }
            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        .modal-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--ink);
        }
        .modal-close {
            background: #eee;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            font-size: 13px;
        }
        .modal-body p {
            margin-bottom: 8px;
            line-height: 1.5;
            color: #444;
        }
        .modal input[type="text"],

        .menu-list {

        .menu-item {

<body>
    <div class="device">
        <!-- TOPBAR -->
        <div class="topbar">

                <span id="pet-name">Blob</span>

        <!-- SCREEN -->
        <div class="screen" id="screen">

                <div class="pet-scene" id="scene">

            <!-- ACTIONS -->
            <div class="actions">
                <button class="action" data-act="feed"><span class="action-icon">🍎</span><span>Feed</span></button>
                <button class="action" data-act="water"><span class="action-icon">💧</span><span>Water</span></button>
                <button class="action" data-act="bath"><span class="action-icon">🛁</span><span>Bath</span></button>
                <button class="action" data-act="play"><span class="action-icon">🎾</span><span>Play</span></button>
                <button class="action" data-act="park"><span class="action-icon">🌳</span><span>Park</span></button>
                <button class="action" data-act="pet"><span class="action-icon">🤗</span><span>Pet</span></button>

            </div>
        </div>
    </div>

    <script>
        // ─── STATE ───
        const STORAGE_KEY = "petpal.v4";
        const DEFAULT_STATE = () => ({
            name: "Blob",
            born: Date.now(),
            lastTick: Date.now(),
            lastPet: 0,
            hunger: 80,
            thirst: 80,
            clean: 100,
            energy: 100,
            fun: 70,
            health: 100,
            sleeping: false,
            scene: "home",
            moodOverride: null,
            moodUntil: 0,
            traits: { playful: 20, affectionate: 20, talkative: 10, curious: 20, independent: 30 },
            vocab: {},
            phrases: [],
            totalMessages: 0,
            memories: [],
            color: null,
            coins: 30,
            inventory: { apple: 3 },
            ownedAccessories: [],
            equipped: { hat: null, eyes: null, neck: null },
            voiceEnabled: false,
            notificationsEnabled: false,
            autoDayNight: true,
            tricks: {},
            pendingTrick: null,
            lastAutoChat: 0,
            lastNotifyAt: 0,
            stageAnnounced: "Egg",
            playmates: [],
            photos: [],
            achievements: {},
            dailyLogin: { last: 0, streak: 0, claimed: false },
            weather: { id: "clear", changedAt: 0 },
            huntStats: { caught: 0, total: 0 },
            petX: 50,
            petY: 50,
            locationUnlocked: ["home", "park", "bath"],
            totalCoinsEarned: 0,
            tricksLearned: 0,
            notes: [],
            appointments: [],
            contacts: [],
            journal: [],
            shooterHighScore: 0,
        });

        let state = load();

        function load() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return DEFAULT_STATE();
                const parsed = JSON.parse(raw);
                const def = DEFAULT_STATE();
                for (const k of Object.keys(def)) {
                    if (!(k in parsed)) parsed[k] = def[k];
                }
                return parsed;
            } catch (e) { return DEFAULT_STATE(); }
        }

        function save() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
        }

        // ─── HELPERS ───
        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

        function rand(min, max) { return Math.random() * (max - min) + min; }

        function ageInHours() { return (Date.now() - state.born) / (1000 * 60 * 60); }

        function getStage() {
            const h = ageInHours();
            const STAGES = [
                { name: "Egg", until: 0.02, size: 0.55 },
                { name: "Baby", until: 0.3, size: 0.75, pitch: 1.8 },
                { name: "Kid", until: 1, size: 0.9, pitch: 1.5 },
                { name: "Teen", until: 3, size: 1.0, pitch: 1.2 },
                { name: "Adult", until: 999, size: 1.1, pitch: 1.0 }
            ];
            for (const s of STAGES)
                if (h < s.until) return s;
            return STAGES[STAGES.length - 1];
        }

        function getMood() {
            if (state.moodOverride && Date.now() < state.moodUntil) return state.moodOverride;
            if (state.sleeping) return "sleeping";
            if (state.health < 30) return "sick";
            if (state.hunger < 25) return "hungry";
            if (state.thirst < 20) return "hungry";
            if (state.clean < 25) return "sad";
            if (state.energy < 20) return "sad";
            if (state.fun < 20) return "sad";
            const avg = (state.hunger + state.thirst + state.clean + state.fun + state.energy) / 5;
            if (avg > 85) return "excited";
            if (avg > 70) return "happy";
            return "idle";
        }

        function pickReply(a) { return a[Math.floor(Math.random() * a.length)]; }

        // ─── DRAGGABLE PET (FIXED) ───
        function initDraggable() {
            const wrap = document.getElementById("pet-wrap");
            const stage = document.getElementById("pet-stage");

            // Set position by centering the wrap at (centerX%, centerY%)
            function setPos(centerXPercent, centerYPercent) {
                const stageRect = stage.getBoundingClientRect();
                const wrapRect = wrap.getBoundingClientRect();
                const wrapW = (wrapRect.width / stageRect.width) * 100;
                const wrapH = (wrapRect.height / stageRect.height) * 100;
                let left = centerXPercent - wrapW / 2;
                let top = centerYPercent - wrapH / 2;
                left = clamp(left, 0, 100 - wrapW);
                top = clamp(top, 0, 100 - wrapH);
                wrap.style.left = left + "%";
                wrap.style.top = top + "%";
                wrap.style.transform = "none";
                state.petX = centerXPercent;
                state.petY = centerYPercent;
            }

            // Restore saved position or center
            if (state.petX !== undefined && state.petX !== null) {
                setPos(state.petX, state.petY);
            } else {
                setPos(50, 50);
            }

            let isDragging = false;
            let dragOffsetX = 0,
                dragOffsetY = 0;

            function getPos(e) {
                const rect = stage.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: ((clientX - rect.left) / rect.width) * 100,
                    y: ((clientY - rect.top) / rect.height) * 100
                };
            }

            function onStart(e) {
                e.preventDefault();
                const rect = stage.getBoundingClientRect();
                const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                const wrapRect = wrap.getBoundingClientRect();
                const wrapCenterX = wrapRect.left + wrapRect.width / 2 - rect.left;
                const wrapCenterY = wrapRect.top + wrapRect.height / 2 - rect.top;
                dragOffsetX = cx - wrapCenterX;
                dragOffsetY = cy - wrapCenterY;
                isDragging = true;
                wrap.classList.add("dragging");
            }

            function onMove(e) {
                if (!isDragging) return;
                e.preventDefault();
                const rect = stage.getBoundingClientRect();
                const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                let centerX = ((cx - dragOffsetX) / rect.width) * 100;
                let centerY = ((cy - dragOffsetY) / rect.height) * 100;
                // Clamp to stage edges considering wrap size
                const wrapRect = wrap.getBoundingClientRect();
                const wrapW = (wrapRect.width / rect.width) * 100;
                const wrapH = (wrapRect.height / rect.height) * 100;
                centerX = clamp(centerX, wrapW / 2, 100 - wrapW / 2);
                centerY = clamp(centerY, wrapH / 2, 100 - wrapH / 2);
                setPos(centerX, centerY);
                save(); // save position continuously
            }

            function onEnd(e) {
                if (isDragging) {
                    isDragging = false;
                    wrap.classList.remove("dragging");
                    save();
                }
            }

            wrap.addEventListener("mousedown", onStart);
            wrap.addEventListener("touchstart", onStart, { passive: false });
            document.addEventListener("mousemove", onMove);
            document.addEventListener("touchmove", onMove, { passive: false });
            document.addEventListener("mouseup", onEnd);
            document.addEventListener("touchend", onEnd);
            document.addEventListener("touchcancel", onEnd);
        }

        // ─── CALL INIT ───
        document.addEventListener("DOMContentLoaded", () => {
            initDraggable();
            // ... rest of your app initialization
        });

        // Fallback if DOMContentLoaded already fired
        if (document.readyState === "complete" || document.readyState === "interactive") {
            initDraggable();
        }

        console.log("🐾 Pet is draggable! Drag it anywhere and the position saves.");
    </script>
</body>
</html>
