                    const tag = e.target.tagName?.toLowerCase() || '';
                    if (tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.isContentEditable) return;
                    if (e.key === "ArrowLeft" || e.key === "a") { e.preventDefault();
                        keys.left = false; }
                    if (e.key === "ArrowRight" || e.key === "d") { e.preventDefault();
                        keys.right = false; }
                    if (e.key === " " || e.key === "ArrowUp" || e.key === "w") { e.preventDefault(); }
                }

                // Remove old listeners if any
                if (shooterKeyHandler) {
                    document.removeEventListener('keydown', shooterKeyHandler);
                    document.removeEventListener('keyup', shooterKeyHandler);
                }
                shooterKeyHandler = safeKeyHandler;
                document.addEventListener('keydown', safeKeyHandler);
                document.addEventListener('keyup', safeKeyUpHandler);

                const touchArea = document.getElementById("s-touch-area");
                touchArea.style.position = "absolute";
                touchArea.style.inset = "0";
                touchArea.style.zIndex = "2";
                touchArea.style.touchAction = "none";

                let touchActive = false;
                let touchX = null;
                let touchY = null;

                touchArea.addEventListener("touchstart", (e) => {
                    e.preventDefault();
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    const t = e.touches[0];
                    touchX = (t.clientX - rect.left) * scaleX;
                    touchY = (t.clientY - rect.top) * scaleY;
                    touchActive = true;
                    if (game.running && !game.gameOver) fireBullet();
                }, { passive: false });

                touchArea.addEventListener("touchmove", (e) => {
                    e.preventDefault();
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    const t = e.touches[0];
                    touchX = (t.clientX - rect.left) * scaleX;
                    touchY = (t.clientY - rect.top) * scaleY;
                }, { passive: false });

                touchArea.addEventListener("touchend", (e) => {
                    e.preventDefault();
                    touchActive = false;
                    touchX = null;
                    touchY = null;
                }, { passive: false });

                document.getElementById("s-left").onmousedown = () => keys.left = true;
                document.getElementById("s-left").onmouseup = () => keys.left = false;
                document.getElementById("s-left").ontouchstart = (e) => { e.preventDefault();
                    keys.left = true; };
                document.getElementById("s-left").ontouchend = (e) => { e.preventDefault();
                    keys.left = false; };
                document.getElementById("s-right").onmousedown = () => keys.right = true;
                document.getElementById("s-right").onmouseup = () => keys.right = false;
                document.getElementById("s-right").ontouchstart = (e) => { e.preventDefault();
                    keys.right = true; };
                document.getElementById("s-right").ontouchend = (e) => { e.preventDefault();
                    keys.right = false; };
                document.getElementById("s-fire").onclick = () => { if (game.running && !game.gameOver) fireBullet(); };
                document.getElementById("s-fire").ontouchstart = (e) => { e.preventDefault(); if (game.running && !game
                        .gameOver) fireBullet(); };

                function fireBullet() {
                    if (game.fireCooldown > 0) return;
                    game.bullets.push({ x: game.player.x + 10, y: game.player.y - 8, w: 4, h: 12, speed: 7 });
                    game.bullets.push({ x: game.player.x + 10, y: game.player.y - 8, w: 4, h: 12, speed: 7 });
                    game.fireCooldown = 8;
                    if (game.powerups.some(p => p.type === "spread" && p.active)) {
                        game.bullets.push({ x: game.player.x - 4, y: game.player.y - 4, w: 4, h: 10, speed: 6, dx: -1.5 });
                        game.bullets.push({ x: game.player.x + 20, y: game.player.y - 4, w: 4, h: 10, speed: 6, dx: 1.5 });
                    }
                    chirp("beep");
                }

                function spawnEnemy() {
                    const types = ["basic", "fast", "tank"];
                    let type = types[0];
                    let r = Math.random();
                    if (r < 0.2 && game.level > 2) type = "fast";
                    if (r < 0.1 && game.level > 4) type = "tank";

                    const configs = {
                        basic: { w: 20, h: 20, hp: 1, speed: 1.2 + game.level * 0.1, score: 10, color: "#ff6b6b" },
                        fast: { w: 16, h: 16, hp: 1, speed: 2.5 + game.level * 0.1, score: 20, color: "#ffd93d" },
                        tank: { w: 28, h: 28, hp: 3, speed: 0.8 + game.level * 0.05, score: 30, color: "#6bcbff" },
                    };
                    const cfg = configs[type];
                    const x = rand(10, 310 - cfg.w);
                    const enemy = {
                        x,
                        y: -cfg.h,
                        w: cfg.w,
                        h: cfg.h,
                        hp: cfg.hp,
                        maxHp: cfg.hp,
                        speed: cfg.speed,
                        score: cfg.score,
                        color: cfg.color,
                        type,
                        shootTimer: rand(60, 180),
                        wobble: rand(0, Math.PI * 2),
                        wobbleSpeed: rand(0.02, 0.06),
                    };
                    game.enemies.push(enemy);
                }

                function spawnPowerup(x, y) {
                    if (Math.random() < 0.08) {
                        const types = ["spread", "speed", "shield"];
                        const type = types[Math.floor(Math.random() * types.length)];
                        game.powerups.push({ x, y, w: 16, h: 16, type, active: true, speed: 1.5, icon: type === "spread" ?
                                "⭐" : type === "speed" ? "⚡" : "🛡" });
                    }
                }

                function updateShooter() {
                    if (!game.running || game.gameOver) return;
                    game.frames++;
                    game.fireCooldown = Math.max(0, game.fireCooldown - 1);

                    let dx = 0;
                    if (keys.left || keys.right) {
                        if (keys.left) dx = -game.player.speed;
                        if (keys.right) dx = game.player.speed;
                    } else if (touchActive && touchX !== null) {
                        const targetX = touchX - game.player.w / 2;
                        const diff = targetX - game.player.x;
                        if (Math.abs(diff) > 2) {
                            dx = Math.sign(diff) * Math.min(game.player.speed, Math.abs(diff));
                        }
                    }
                    game.player.x = clamp(game.player.x + dx, 0, 320 - game.player.w);
                    if (touchActive && touchY !== null && touchY < game.player.y - 20) {
                        if (game.fireCooldown === 0) fireBullet();
                    }

                    for (const s of game.stars) {
                        s.y += s.speed;
                        if (s.y > 480) { s.y = 0;
                            s.x = rand(0, 320); }
                    }

                    for (const b of game.bullets) {
                        b.y -= b.speed;
                        if (b.dx) b.x += b.dx;
                    }
                    game.bullets = game.bullets.filter(b => b.y > -10 && b.x > -10 && b.x < 330);

                    for (const b of game.enemyBullets) {
                        b.y += b.speed;
                        b.x += b.dx || 0;
                    }
                    game.enemyBullets = game.enemyBullets.filter(b => b.y < 490);

                    for (const e of game.enemies) {
                        e.y += e.speed;
                        e.wobble += e.wobbleSpeed;
                        e.x += Math.sin(e.wobble) * 0.5;
                        e.x = clamp(e.x, 0, 320 - e.w);
                        e.shootTimer--;
                        if (e.shootTimer <= 0 && e.y > 30) {
                            e.shootTimer = rand(60, 180 - game.level * 5);
                            const dx = (game.player.x + game.player.w / 2) - (e.x + e.w / 2);
                            const dy = (game.player.y + game.player.h / 2) - (e.y + e.h / 2);
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist > 0) {
                                game.enemyBullets.push({
                                    x: e.x + e.w / 2 - 3,
                                    y: e.y + e.h,
                                    w: 6,
                                    h: 6,
                                    speed: 2 + game.level * 0.2,
                                    dx: (dx / dist) * 0.8,
                                });
                            }
                        }
                    }

                    game.enemySpawnTimer--;
                    if (game.enemySpawnTimer <= 0 && game.enemies.length < game.maxEnemies + game.level) {
                        spawnEnemy();
                        game.enemySpawnTimer = Math.max(15, game.enemySpawnRate - game.level * 2);
                    }

                    for (const b of game.bullets) {
                        for (const e of game.enemies) {
                            if (b.x < e.x + e.w && b.x + b.w > e.x &&
                                b.y < e.y + e.h && b.y + b.h > e.y) {
                                e.hp--;
                                b.y = -100;
                                if (e.hp <= 0) {
                                    const idx = game.enemies.indexOf(e);
                                    if (idx > -1) {
                                        game.enemies.splice(idx, 1);
                                        game.score += e.score;
                                        game.combo++;
                                        if (game.combo > game.maxCombo) game.maxCombo = game.combo;
                                        spawnPowerup(e.x + e.w / 2, e.y + e.h / 2);
                                        game.explosions.push({ x: e.x + e.w / 2, y: e.y + e.h / 2, life: 15, maxLife: 15,
                                            size: e.w });
                                        chirp("hunt");
                                        document.getElementById("s-score").textContent = game.score;
                                        const newLevel = Math.floor(game.score / 50) + 1;
                                        if (newLevel > game.level) {
                                            game.level = newLevel;
                                            document.getElementById("s-level").textContent = game.level;
                                            toast(`🎯 Level ${game.level}!`, "achievement");
                                            chirp("level");
                                            game.lives = Math.min(5, game.lives + 1);
                                            document.getElementById("s-lives").textContent = game.lives;
                                        }
                                    }
                                }
                                break;
                            }
                        }
                    }

                    for (const b of game.enemyBullets) {
                        const px = game.player.x,
                            py = game.player.y,
                            pw = game.player.w,
                            ph = game.player.h;
                        if (b.x < px + pw && b.x + b.w > px &&
                            b.y < py + ph && b.y + b.h > py) {
                            b.y = 500;
                            hitPlayer();
                        }
                    }

                    for (const e of game.enemies) {
                        const px = game.player.x,
                            py = game.player.y,
                            pw = game.player.w,
                            ph = game.player.h;
                        if (e.x < px + pw && e.x + e.w > px &&
                            e.y < py + ph && e.y + e.h > py) {
                            const idx = game.enemies.indexOf(e);
                            if (idx > -1) game.enemies.splice(idx, 1);
                            hitPlayer();
                            break;
                        }
                    }

                    for (const p of game.powerups) {
                        p.y += p.speed;
                        const px = game.player.x,
                            py = game.player.y,
                            pw = game.player.w,
                            ph = game.player.h;
                        if (p.x < px + pw && p.x + p.w > px &&
                            p.y < py + ph && p.y + p.h > py) {
                            p.active = false;
                            if (p.type === "spread") {
                                game.powerups = game.powerups.filter(p2 => p2.type !== "spread" || p2 === p);
                                p.active = true;
                                p.life = 300;
                                toast("⭐ Spread shot!", "achievement");
                            } else if (p.type === "speed") {
                                game.player.speed = 6;
                                setTimeout(() => { game.player.speed = 4; }, 5000);
                                toast("⚡ Speed boost!", "achievement");
                            } else if (p.type === "shield") {
                                game.lives = Math.min(5, game.lives + 1);
                                document.getElementById("s-lives").textContent = game.lives;
                                toast("🛡 Extra life!", "achievement");
                            }
                            chirp("coin");
                        }
                    }
                    game.powerups = game.powerups.filter(p => p.active && p.y < 490);

                    for (const p of game.powerups) {
                        if (p.life !== undefined) {
                            p.life--;
                            if (p.life <= 0) p.active = false;
                        }
                    }
                    game.powerups = game.powerups.filter(p => p.active);

                    game.enemies = game.enemies.filter(e => e.y < 490);

                    if (game.lives <= 0) {
                        game.gameOver = true;
                        game.running = false;
                        if (game.score > state.shooterHighScore) {
                            state.shooterHighScore = game.score;
                            save();
                            toast("🏆 New high score!", "achievement");
                            checkAchievements();
                        }
                        overlay.classList.add("show");
                        overlay.innerHTML = `
                  <h2>💥 Game Over</h2>
                  <p>Score: ${game.score}</p>
                  <p style="font-size:12px;">Combo: ${game.maxCombo} | Level: ${game.level}</p>
                  <p style="font-size:11px; color:${game.score>state.shooterHighScore?'#ffd93d':'#888'};">High score: ${state.shooterHighScore}</p>
                  <button class="btn-play" id="s-restart-btn">🔄 Restart</button>
                `;
                        document.getElementById("s-restart-btn").onclick = restartShooter;
                        document.getElementById("s-score").textContent = game.score;
                    }

                    document.getElementById("s-lives").textContent = game.lives;
                    document.getElementById("s-score").textContent = game.score;
                    document.getElementById("s-level").textContent = game.level;

                    drawShooter(game, ctx);
                    requestAnimationFrame(updateShooter);
                }

                function hitPlayer() {
                    game.lives--;
                    document.getElementById("s-lives").textContent = game.lives;
                    chirp("sad");
                    game.explosions.push({ x: game.player.x + game.player.w / 2, y: game.player.y + game.player.h / 2,
                        life: 20, maxLife: 20, size: 30 });
                    game.player.x = 160 - game.player.w / 2;
                    game.combo = 0;
                    if (game.lives <= 0) {
                        game.gameOver = true;
                        game.running = false;
                    }
                }

                function drawShooter(g, ctx) {
                    ctx.clearRect(0, 0, 320, 480);

                    for (const s of g.stars) {
                        ctx.fillStyle = `rgba(255,255,255,${0.4 + Math.random()*0.3})`;
                        ctx.beginPath();
                        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    for (const p of g.powerups) {
                        ctx.font = "16px sans-serif";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.shadowColor = "rgba(255,255,255,0.3)";
                        ctx.shadowBlur = 8;
                        ctx.fillText(p.icon, p.x + p.w / 2, p.y + p.h / 2);
                        ctx.shadowBlur = 0;
                    }

                    for (const b of g.enemyBullets) {
                        ctx.fillStyle = "#ff6b6b";
                        ctx.shadowColor = "#ff6b6b";
                        ctx.shadowBlur = 8;
                        ctx.beginPath();
                        ctx.arc(b.x + 3, b.y + 3, 4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }

                    for (const e of g.enemies) {
                        ctx.fillStyle = e.color;
                        ctx.shadowColor = e.color;
                        ctx.shadowBlur = 10;
                        ctx.beginPath();
                        if (e.type === "tank") {
                            ctx.roundRect(e.x, e.y, e.w, e.h, 4);
                        } else if (e.type === "fast") {
                            ctx.beginPath();
                            ctx.moveTo(e.x + e.w / 2, e.y);
                            ctx.lineTo(e.x + e.w, e.y + e.h);
                            ctx.lineTo(e.x, e.y + e.h);
                            ctx.closePath();
                        } else {
                            ctx.roundRect(e.x, e.y, e.w, e.h, 6);
                        }
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        if (e.maxHp > 1) {
                            ctx.fillStyle = "#333";
                            ctx.fillRect(e.x, e.y - 6, e.w, 3);
                            ctx.fillStyle = "#6bcbff";
                            ctx.fillRect(e.x, e.y - 6, (e.hp / e.maxHp) * e.w, 3);
                        }
                        ctx.fillStyle = "white";
                        ctx.fillRect(e.x + 4, e.y + 4, 4, 4);
                        ctx.fillRect(e.x + e.w - 8, e.y + 4, 4, 4);
                        ctx.fillStyle = "#222";
                        ctx.fillRect(e.x + 5, e.y + 5, 2, 2);
                        ctx.fillRect(e.x + e.w - 7, e.y + 5, 2, 2);
                    }

                    for (const b of g.bullets) {
                        ctx.fillStyle = "#ffd93d";
                        ctx.shadowColor = "#ffd93d";
                        ctx.shadowBlur = 12;
                        ctx.fillRect(b.x, b.y, b.w, b.h);
                        ctx.shadowBlur = 0;
                    }

                    const p = g.player;
                    ctx.shadowColor = "#6bcbff";
                    ctx.shadowBlur = 15;
                    ctx.fillStyle = "#4a8ec4";
                    ctx.beginPath();
                    ctx.moveTo(p.x + p.w / 2, p.y);
                    ctx.lineTo(p.x + p.w, p.y + p.h);
                    ctx.lineTo(p.x, p.y + p.h);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = "#7bc4f0";
                    ctx.beginPath();
                    ctx.arc(p.x + p.w / 2, p.y + 8, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = "#3a7a9a";
                    ctx.fillRect(p.x - 4, p.y + 8, 4, 8);
                    ctx.fillRect(p.x + p.w, p.y + 8, 4, 8);
                    ctx.shadowBlur = 0;

                    for (const ex of g.explosions) {
                        const progress = 1 - ex.life / ex.maxLife;
                        const size = ex.size * (1 + progress * 1.5);
                        const alpha = 1 - progress;
                        ctx.fillStyle = `rgba(255,200,50,${alpha*0.6})`;
                        ctx.beginPath();
                        ctx.arc(ex.x, ex.y, size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = `rgba(255,100,50,${alpha*0.4})`;
                        ctx.beginPath();
                        ctx.arc(ex.x, ex.y, size * 0.6, 0, Math.PI * 2);
                        ctx.fill();
                        ex.life--;
                    }
                    g.explosions = g.explosions.filter(ex => ex.life > 0);

                    if (g.combo > 2) {
                        ctx.fillStyle = "#ffd93d";
                        ctx.font = "14px sans-serif";
                        ctx.textAlign = "center";
                        ctx.fillText(`🔥 ${g.combo}x`, 160, 30);
                    }
                }

                function restartShooter() {
                    game.running = false;
                    game.gameOver = false;
                    game.score = 0;
                    game.lives = 3;
                    game.level = 1;
                    game.combo = 0;
                    game.maxCombo = 0;
                    game.bullets = [];
                    game.enemies = [];
                    game.enemyBullets = [];
                    game.explosions = [];
                    game.powerups = [];
                    game.frames = 0;
                    game.enemySpawnTimer = 30;
                    game.player.x = 160 - game.player.w / 2;
                    game.player.y = 430;
                    game.fireCooldown = 0;
                    document.getElementById("s-lives").textContent = 3;
                    document.getElementById("s-score").textContent = 0;
                    document.getElementById("s-level").textContent = 1;
                    overlay.classList.remove("show");
                    game.running = true;
                    updateShooter();
                }

                document.getElementById("s-start-btn").onclick = () => {
                    overlay.classList.remove("show");
                    game.running = true;
                    updateShooter();
                };

                if (!CanvasRenderingContext2D.prototype.roundRect) {
                    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                        if (r > w / 2) r = w / 2;
                        if (r > h / 2) r = h / 2;
                        this.moveTo(x + r, y);
                        this.lineTo(x + w - r, y);
                        this.quadraticCurveTo(x + w, y, x + w, y + r);
                        this.lineTo(x + w, y + h - r);
                        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                        this.lineTo(x + r, y + h);
                        this.quadraticCurveTo(x, y + h, x, y + h - r);
                        this.lineTo(x, y + r);
                        this.quadraticCurveTo(x, y, x + r, y);
                        return this;
                    };
                }

                drawShooter(game, ctx);
            }, 100);
        }

                };
                document.getElementById("m-voice").onclick = () => {
                    state.voiceEnabled = !state.voiceEnabled;
                    save();
                    if (state.voiceEnabled) { initTTS();
                        initAudio();
                        chirp("happy");
                        speak("I can talk now!"); }
                    openMenu();
                };
                document.getElementById("m-notif").onclick = () => {
                    if (!state.notificationsEnabled) requestNotifications();
                    else { state.notificationsEnabled = false;
                        save();
                        openMenu(); }
                };
                document.getElementById("m-daynight").onclick = () => {
                    state.autoDayNight = !state.autoDayNight;
                    save();
                    updateScene();
                    openMenu();
                };
                document.getElementById("m-locations").onclick = () => {
                    openModal("📍 Locations", `
                <p style="font-size:12px; color:#888;">Tap to change scene. 🔒 = locked.</p>
                <div class="menu-list">${locOptions}</div>
              `);
                    setTimeout(() => {
                        document.querySelectorAll("[data-loc]").forEach(btn => {
                            btn.onclick = () => {
                                const id = btn.dataset.loc;
                                if (state.locationUnlocked.includes(id)) changeLocation(id);
                                else toast("🔒 Locked! Keep playing.");
                            };
                        });
                    }, 50);
                };
                document.getElementById("m-personality").onclick = () => {
                    openModal("🧠 Personality", `
                <p style="font-size:11px; color:#888;">${state.name} — ${state.totalMessages} messages, ${ageInHours().toFixed(1)} hours old.</p>
                ${traitList}
                <p style="font-size:11px; margin-top:8px; color:#888;">💡 Talk, pet, and play to shape personality!</p>
              `);
                };
                document.getElementById("m-vocab").onclick = () => {
                    const words = Object.entries(state.vocab).sort((a, b) => b[1].count - a[1].count).slice(0, 30);
                    openModal("📖 Vocabulary", `
                <p style="font-size:11px; color:#888;">Words ${state.name} has learned:</p>
                <div style="display:flex; flex-wrap:wrap; gap:4px; margin-top:6px;">
                  ${words.length ? words.map(([w,d]) => `<span class="badge" style="background:#eee; padding:2px 8px; border-radius:12px; font-size:11px;">${w} ×${d.count}</span>`).join(" ") : "<i>No words yet. Talk to your pet!</i>"}
                </div>
              `);
                };
                document.getElementById("m-tricks").onclick = () => {
                    const list = Object.entries(state.tricks);
                    openModal("🎓 Tricks", `
                <p style="font-size:11px; color:#888;">Say these words to make me do things:</p>
                ${list.length ? list.map(([w,t]) => `<div style="padding:4px 0; border-bottom:1px solid #f0f0f0; font-size:13px;"><b>"${w}"</b> → ${t.action} <span style="color:#888; font-size:11px;">(lvl ${Math.floor(t.level)}/3)</span></div>`).join("") : "<i>No tricks yet. Tap Train!</i>"}
                <div class="modal-actions"><button class="btn-primary" onclick="startTraining()">🎓 Train new</button></div>
              `);
                };
                document.getElementById("m-achievements").onclick = () => {
                    const total = Object.keys(ACHIEVEMENTS).length;
                    const unlocked = Object.keys(state.achievements).filter(k => k in ACHIEVEMENTS).length;
                    openModal("🏆 Achievements", `
                <p style="font-size:12px; color:#888;">${unlocked}/${total} unlocked</p>
                <div style="max-height:200px; overflow-y:auto;">${achList}</div>
              `);
                };
                document.getElementById("m-gallery").onclick = () => { closeModal();
                    openGallery(); };
                document.getElementById("m-daily").onclick = () => {
                    const streak = state.dailyLogin.streak || 0;
                    const bonus = Math.min(20 + streak * 2, 100);
                    openModal("🌅 Daily Reward", `
                <p style="text-align:center; font-size:40px; margin:8px 0;">🎁</p>
                <p style="text-align:center; font-size:16px;">Day ${streak} streak!</p>
                <p style="text-align:center; font-size:20px; color:#b58900;">+${bonus} 💰</p>
                <div class="modal-actions">
                  <button class="btn-primary" id="daily-claim">Claim</button>
                  <button class="btn-secondary" onclick="closeModal()">Close</button>
                </div>
              `);
                    setTimeout(() => {
                        document.getElementById("daily-claim").onclick = () => {
                            if (state.dailyLogin.claimed) { toast("Already claimed today!"); return; }
                            state.dailyLogin.claimed = true;
                            state.dailyLogin.last = Date.now();
                            earnCoins(bonus, true);
                            toast(`+${bonus} daily bonus!`, "coin");
                            closeModal();
                            save();
                            updateUI();
                        };
                    }, 50);
                };
                document.getElementById("m-reset").onclick = () => {
                    openModal("🗑 Reset?", `
                <p>Really reset your pet? All progress, memories, coins, notes, and photos will be lost.</p>
                <div class="modal-actions">
                  <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                  <button class="btn-primary" id="reset-ok" style="background:var(--danger);">Yes, reset</button>
                </div>
              `);
                    setTimeout(() => {
                        document.getElementById("reset-ok").onclick = () => {
                            localStorage.removeItem(STORAGE_KEY);
                            location.reload();
                        };
                    }, 50);
                };
            }, 50);
        }

        /* ─── UI UPDATE ─── */
        function updateUI() {
            document.getElementById("pet-name").textContent = state.name;
            const stage = getStage();
            document.getElementById("pet-age").textContent = stage.name;
            document.getElementById("stage-tag").textContent = stage.name;
            document.getElementById("mood-tag").textContent = state.sleeping ? "asleep" : getMood();
            document.getElementById("coin-count").textContent = state.coins;

            const statsEl = document.getElementById("stats");
            statsEl.innerHTML = STAT_KEYS.map(k => {
                const v = Math.round(state[k]);
                let cls = "";
                if (v < 25) cls = "low";
                else if (v < 50) cls = "mid";
                return `<div class="stat">
              <div class="stat-label"><span>${STAT_LABELS[k]}</span><span>${v}</span></div>
              <div class="stat-bar"><div class="stat-fill ${cls}" style="width:${v}%"></div></div>
            </div>`;
            }).join("");

            drawPet();
            document.getElementById("sleep-label").textContent = state.sleeping ? "Wake" : "Sleep";
            updateScene();
        }

        /* ─── TICK ─── */
        function tick() {
            const now = Date.now();
            const dtSec = Math.min(60, (now - state.lastTick) / 1000);
            state.lastTick = now;
            const tod = getTimeOfDay();
            const isNight = tod === "night";

            if (state.sleeping) {
                state.energy = Math.min(100, state.energy + dtSec * 0.5);
                state.hunger = Math.max(0, state.hunger - dtSec * DRAIN.hunger * 0.3);
                state.thirst = Math.max(0, state.thirst - dtSec * DRAIN.thirst * 0.3);
                if (state.energy >= 100 && Math.random() < 0.02) wakeUp("auto");
            } else {
                for (const k of STAT_KEYS) {
                    if (k === "health") continue;
                    let mult = 1;
                    if (k === "energy" && isNight) mult = 2;
                    state[k] = Math.max(0, state[k] - dtSec * DRAIN[k] * mult);
                }
            }

            if (state.hunger < 15 || state.thirst < 10 || state.clean < 10) {
                state.health = Math.max(0, state.health - dtSec * 0.3);
            } else if (state.hunger > 60 && state.thirst > 60 && state.clean > 60) {
                state.health = Math.min(100, state.health + dtSec * 0.1);
            }

            const timeSinceLastPet = (Date.now() - (state.lastPet || state.born)) / (1000 * 60 * 60);
            if (timeSinceLastPet > 4) {
                state.traits.independent = Math.min(100, state.traits.independent + 0.01);
                state.traits.affectionate = Math.max(0, state.traits.affectionate - 0.005);
            }

            const curStage = getStage().name;
            if (curStage !== state.stageAnnounced) {
                state.stageAnnounced = curStage;
                state.coins += 50;
                toast(`${state.name} grew into a ${curStage}! +50 coins`, "coin");
                chirp("level");
                log("system", `Grew into ${curStage}`);
                checkAchievements();
            }

            const timeSinceLastChat = (Date.now() - (state.lastAutoChat || 0)) / 1000;
            const chatChance = (state.traits.talkative / 100) * 0.02;
            if (!state.sleeping && timeSinceLastChat > 20 && Math.random() < chatChance && !isBubbleShowing()) {
                speak(generateSpontaneous(), 3000);
                state.lastAutoChat = Date.now();
            }

            if (document.hidden && state.notificationsEnabled) {
                const critical = state.hunger < 20 || state.thirst < 15 || state.health < 30 || state.clean < 15;
                if (critical && Date.now() - state.lastNotifyAt > 5 * 60 * 1000) {
                    sendNotification();
                    state.lastNotifyAt = Date.now();
                }
            }

            updateWeather();
            updateUI();
            save();
        }

        /* ─── BINDINGS ─── */
        document.querySelectorAll(".action").forEach(btn => {
            btn.addEventListener("click", () => {
                const act = btn.dataset.act;
                if (act === "feed") feed();
                else if (act === "water") water();
                else if (act === "bath") bath();
                else if (act === "play") play();
                else if (act === "park") park();
                else if (act === "pet") pet();
                else if (act === "medicine") medicine();
                else if (act === "sleep") sleep();
                else if (act === "game") openGames();
                else if (act === "shooter") { closeModal();
                    launchShooter(); }
                updateUI();
                save();
            });
        });

        const chatInput = document.getElementById("chat-input");
        document.getElementById("send-btn").addEventListener("click", sendChat);
        chatInput.addEventListener("keydown", (e) => { if (e.key === "Enter") sendChat(); });

        function sendChat() {
            const v = chatInput.value.trim();
            if (!v) return;
            chatInput.value = "";
            handleUserMessage(v);
            updateUI();
            save();
        }

        document.getElementById("mic-btn").onclick = () => { initAudio();
            toggleListen(); };
        document.getElementById("menu-btn").onclick = openMenu;
        document.getElementById("shop-btn").onclick = openShop;
        document.getElementById("camera-btn").onclick = takePhoto;
        document.getElementById("journal-btn").onclick = openJournal;
        document.getElementById("pet").addEventListener("click", () => { pet();
            updateUI();
            save(); });

        /* ─── INIT ─── */
        if (state.totalMessages === 0 && state.name === "Blob" && !localStorage.getItem(STORAGE_KEY)) {
            save();
            setTimeout(() => {
                openModal("🐣 Welcome!", `
              <p>Name your new pet:</p>
              <input type="text" id="init-name" maxlength="16" value="Blob" />
              <div class="modal-actions">
                <button class="btn-primary" id="init-ok" style="width:100%;">Hatch egg</button>
              </div>
            `);
                setTimeout(() => {
                    const inp = document.getElementById("init-name");
                    inp.focus();
                    inp.select();
                    document.getElementById("init-ok").onclick = () => {
                        const v = inp.value.trim();
                        if (v) state.name = v.slice(0, 16);
                        state.locationUnlocked = ["home", "park", "bath"];
                        save();
                        updateUI();
                        closeModal();
                        setTimeout(() => {
                            speak(`Hi! I'm ${state.name}! Take care of me?`, 5000);
                            log("system", `${state.name} was born!`);
                            checkAchievements();
                        }, 500);
                    };
                    inp.onkeydown = (e) => { if (e.key === "Enter") document.getElementById("init-ok").click(); };
                }, 50);
            }, 300);
        }

        checkDailyLogin();
        initTTS();
        updateScene();
        updateUI();
        initDraggable();

        setTimeout(() => {
            if (ageInHours() > 5 && !state.locationUnlocked.includes("beach")) { state.locationUnlocked.push("beach");
                save(); }
            if (ageInHours() > 12 && !state.locationUnlocked.includes("forest")) { state.locationUnlocked.push("forest");
                save(); }
            if (state.totalMessages > 30 && !state.locationUnlocked.includes("city")) { state.locationUnlocked.push("city");
                save(); }
            if (state.totalCoinsEarned > 100 && !state.locationUnlocked.includes("mountain")) { state.locationUnlocked.push(
                    "mountain");
                save(); }
            if (state.huntStats.caught > 5 && !state.locationUnlocked.includes("space")) { state.locationUnlocked.push(
                    "space");
                save(); }
            if (state.photos.length > 3 && !state.locationUnlocked.includes("snow")) { state.locationUnlocked.push("snow");
                save(); }
            if (state.playmates.length > 2 && !state.locationUnlocked.includes("rain")) { state.locationUnlocked.push("rain");
                save(); }
        }, 1000);

        setInterval(tick, 1000);
        setInterval(drawPet, 500);
        setInterval(save, 5000);

        document.addEventListener("visibilitychange", () => {
            if (!document.hidden) { tick();
                updateUI(); }
        });

        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("sw.js").catch(() => {});
            });
        }

        // Expose for inline
        window.feed = feed;
        window.water = water;
        window.bath = bath;
        window.play = play;
        window.park = park;
        window.pet = pet;
        window.medicine = medicine;
        window.sleep = sleep;
        window.startHunt = startHunt;
        window.openGames = openGames;
        window.openShop = openShop;
        window.openMenu = openMenu;
        window.takePhoto = takePhoto;
        window.openGallery = openGallery;
        window.clearPhotos = clearPhotos;
        window.deletePhoto = deletePhoto;
        window.startTraining = startTraining;
        window.closeModal = closeModal;
        window.openModal = openModal;
        window.changeLocation = changeLocation;
        window.toast = toast;
        window.speak = speak;
        window.spawnHearts = spawnHearts;
        window.earnCoins = earnCoins;
        window.buyPlaymate = buyPlaymate;
        window.checkAchievements = checkAchievements;
        window.playCatch = playCatch;
        window.playMemory = playMemory;
        window.launchShooter = launchShooter;
        window.openJournal = openJournal;
        window.save = save;
        window.deleteNote = deleteNote;
        window.deleteAppt = deleteAppt;
        window.deleteContact = deleteContact;
        window.deleteJournal = deleteJournal;

        console.log("🐾 PetPal v4 loaded! Journal, Notes, Contacts, Appointments + Twin-Bee Shooter (spacebar fixed!)");
        console.log(`💰 ${state.coins} coins | 📸 ${state.photos.length} photos | 📓 ${state.notes.length} notes`);
        console.log(`🚀 High score: ${state.shooterHighScore}`);
    </script>
</body>
</html>
