<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#f7c5cc" />
<title>PetPal — Your AI Companion</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<style>
  :root{
    --bg:#f7c5cc;
    --shell:#ffe0e5;
    --shell-2:#f4a8b3;
    --screen:#c9e8b5;
    --screen-dark:#8ac273;
    --ink:#1a2b0f;
    --btn:#ffb3c1;
    --btn-hover:#ff8fa6;
    --btn-active:#e07688;
    --gold:#f7d774;
    --sad:#7ba7d1;
    --happy:#f7d774;
    --danger:#e56b6f;
    --ok:#7bc47f;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none;}
  body{
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 30% 20%, #ffd6dc, var(--bg));
    color: var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    user-select:none;
    -webkit-user-select:none;
  }
  .device{
    width: 100%;
    max-width: 420px;
    height: 100dvh;
    max-height: 900px;
    background: linear-gradient(160deg, var(--shell), var(--shell-2));
    border-radius: 32px;
    padding: 18px 16px 16px;
    display:flex;
    flex-direction:column;
    gap: 12px;
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.08), inset 0 2px 0 rgba(255,255,255,0.5), 0 20px 40px rgba(200,80,110,0.2);
    position:relative;
  }
  /* Top bar */
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 0 4px;
    font-size: 12px;
    font-weight: 700;
    color: #7a3a48;
    letter-spacing: 0.5px;
  }
  .topbar .name-box{
    display:flex;
    align-items:center;
    gap: 6px;
  }
  .topbar .badge{
    background: rgba(255,255,255,0.4);
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 11px;
  }
  .topbar button{
    background: rgba(255,255,255,0.5);
    border: none;
    color: #7a3a48;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    cursor:pointer;
    font-family: inherit;
  }
  /* Screen */
  .screen{
    background: linear-gradient(180deg, #d5f0c2, var(--screen));
    border-radius: 20px;
    padding: 14px;
    flex: 1;
    min-height: 0;
    display:flex;
    flex-direction:column;
    gap: 10px;
    box-shadow: inset 0 3px 6px rgba(0,0,0,0.15), inset 0 -1px 0 rgba(255,255,255,0.4);
    position:relative;
    overflow:hidden;
  }
  .screen::before{
    content:"";
    position:absolute;
    inset:0;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.02) 0, rgba(0,0,0,0.02) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
  }
  /* Stats */
  .stats{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    font-size: 10px;
    font-weight: 700;
    color: var(--ink);
  }
  .stat{
    display:flex;
    flex-direction:column;
    gap: 2px;
  }
  .stat-label{
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .stat-bar{
    height: 6px;
    background: rgba(0,0,0,0.12);
    border-radius: 4px;
    overflow:hidden;
    position:relative;
  }
  .stat-fill{
    height:100%;
    background: var(--ink);
    border-radius: 4px;
    transition: width 0.4s ease, background 0.3s;
  }
  .stat-fill.low{ background: var(--danger); }
  .stat-fill.mid{ background: #b58900; }
  /* Pet display */
  .pet-stage{
    flex: 1;
    min-height: 0;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }
  .pet-scene{
    width: 100%;
    height: 100%;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }
  .ground{
    position:absolute;
    bottom: 8px;
    left: 10%;
    right: 10%;
    height: 4px;
    background: rgba(0,0,0,0.15);
    border-radius: 50%;
    filter: blur(2px);
  }
  #pet{
    width: 55%;
    max-width: 180px;
    height: auto;
    animation: idle 3s ease-in-out infinite;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
  }
  #pet.sleeping{ animation: sleep 4s ease-in-out infinite; }
  #pet.happy{ animation: bounce 0.8s ease-in-out infinite; }
  #pet.sad{ animation: sway 4s ease-in-out infinite; opacity: 0.85; }
  #pet.playing{ animation: bounce 0.5s ease-in-out infinite; }
  #pet.eating{ animation: eat 0.4s ease-in-out infinite; }
  #pet.bathing{ animation: shake 0.3s ease-in-out infinite; }
  @keyframes idle{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
  @keyframes bounce{ 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-16px) scale(1.05);} }
  @keyframes sleep{ 0%,100%{transform:scale(1,1);} 50%{transform:scale(1.03,0.97);} }
  @keyframes sway{ 0%,100%{transform:rotate(-3deg);} 50%{transform:rotate(3deg);} }
  @keyframes eat{ 0%,100%{transform:scale(1,1);} 50%{transform:scale(1.05,0.95);} }
  @keyframes shake{ 0%,100%{transform:translateX(-3px);} 50%{transform:translateX(3px);} }

  .zzz{
    position:absolute;
    top: 10%;
    right: 25%;
    font-size: 24px;
    font-weight: 700;
    color: var(--ink);
    opacity: 0;
    animation: zzz 3s ease-in-out infinite;
  }
  @keyframes zzz{
    0%{opacity:0; transform:translate(0,0);}
    30%{opacity:1;}
    100%{opacity:0; transform:translate(20px,-30px);}
  }
  .hearts, .particles{
    position:absolute;
    pointer-events:none;
    inset:0;
  }
  .heart{
    position:absolute;
    font-size: 20px;
    animation: rise 1.5s ease-out forwards;
  }
  @keyframes rise{
    0%{opacity:1; transform:translateY(0) scale(0.5);}
    100%{opacity:0; transform:translateY(-80px) scale(1.2);}
  }
  /* Speech bubble */
  .bubble{
    position:absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    background: white;
    color: var(--ink);
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.4;
    font-weight: 600;
    box-shadow: 0 3px 0 rgba(0,0,0,0.15);
    border: 2px solid var(--ink);
    max-width: 90%;
    margin: 0 auto;
    z-index: 5;
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.3s;
    pointer-events:none;
  }
  .bubble.show{
    opacity:1;
    transform: translateY(0);
    pointer-events:auto;
  }
  .bubble::after{
    content:"";
    position:absolute;
    bottom:-10px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height:0;
    border: 6px solid transparent;
    border-top-color: var(--ink);
  }
  .bubble::before{
    content:"";
    position:absolute;
    bottom:-7px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height:0;
    border: 5px solid transparent;
    border-top-color: white;
    z-index: 1;
  }
  .mood-tag{
    position:absolute;
    bottom: 4px;
    left: 8px;
    font-size: 10px;
    color: rgba(0,0,0,0.5);
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .stage-info{
    position:absolute;
    bottom: 4px;
    right: 8px;
    font-size: 10px;
    color: rgba(0,0,0,0.5);
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* Actions */
  .actions{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .action{
    background: linear-gradient(180deg, var(--btn), var(--btn-hover));
    border: none;
    border-radius: 14px;
    padding: 10px 4px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 4px;
    cursor:pointer;
    color: #4a1424;
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    box-shadow: 0 3px 0 var(--btn-active), inset 0 1px 0 rgba(255,255,255,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 0.3px;
  }
  .action:active{
    transform: translateY(2px);
    box-shadow: 0 1px 0 var(--btn-active), inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .action:disabled{
    opacity: 0.4;
    cursor: not-allowed;
  }
  .action-icon{
    font-size: 22px;
    line-height:1;
  }

  /* Chat */
  .chat-bar{
    display:flex;
    gap: 8px;
    align-items:center;
    background: rgba(255,255,255,0.5);
    border-radius: 999px;
    padding: 4px 4px 4px 14px;
  }
  .chat-input{
    flex:1;
    background: transparent;
    border: none;
    outline: none;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    padding: 8px 0;
    min-width: 0;
  }
  .chat-input::placeholder{
    color: rgba(0,0,0,0.4);
  }
  .send-btn{
    background: var(--ink);
    color: white;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink: 0;
  }
  .send-btn:active{ transform: scale(0.95); }

  /* Modal */
  .modal-bg{
    position:absolute;
    inset:0;
    background: rgba(0,0,0,0.4);
    display:none;
    align-items:center;
    justify-content:center;
    z-index: 100;
    border-radius: 32px;
    padding: 20px;
  }
  .modal-bg.show{ display:flex; }
  .modal{
    background: white;
    border-radius: 20px;
    padding: 20px;
    width: 100%;
    max-width: 320px;
    text-align: center;
  }
  .modal h2{
    font-size: 18px;
    margin-bottom: 8px;
    color: var(--ink);
  }
  .modal p{
    font-size: 13px;
    color: #555;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .modal input{
    width: 100%;
    padding: 10px 14px;
    border: 2px solid var(--shell-2);
    border-radius: 12px;
    font-family: inherit;
    font-size: 15px;
    margin-bottom: 12px;
    outline: none;
  }
  .modal input:focus{ border-color: var(--btn-active); }
  .modal-actions{
    display:flex;
    gap: 8px;
    justify-content: center;
  }
  .modal-actions button{
    flex: 1;
    padding: 10px 16px;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-primary{
    background: var(--btn-active);
    color: white;
  }
  .btn-secondary{
    background: #eee;
    color: #555;
  }

  /* Log panel */
  .log{
    max-height: 80px;
    overflow-y: auto;
    background: rgba(0,0,0,0.05);
    border-radius: 10px;
    padding: 6px 10px;
    font-size: 11px;
    color: #333;
    line-height: 1.5;
    scroll-behavior: smooth;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .log-entry{
    opacity: 0.85;
  }
  .log-entry.me{ color: #7a3a48; font-weight: 600; }
  .log-entry.pet{ color: #1a5a2b; font-weight: 600; }
  .log-entry.system{ font-style: italic; color: #888; }

  /* Park scene */
  .park-bg{
    background: linear-gradient(180deg, #a0d8ef 0%, #a0d8ef 60%, #7bc47f 60%, #7bc47f 100%);
  }
  .bath-bg{
    background: linear-gradient(180deg, #d0edf7, #a0d8ef);
  }
  .night-bg{
    background: linear-gradient(180deg, #2b3a52, #4a5a72);
  }
  .night-bg .stat, .night-bg .mood-tag, .night-bg .stage-info{ color: white; }

  .star{
    position:absolute;
    color: white;
    font-size: 12px;
    opacity: 0.8;
    animation: twinkle 2s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:0.3;}
    50%{opacity:1;}
  }

  /* Screen flash */
  .flash{
    position:absolute;
    inset:0;
    background: white;
    opacity: 0;
    pointer-events:none;
    z-index: 20;
  }
  .flash.on{
    animation: flash 0.4s ease-out;
  }
  @keyframes flash{
    0%{opacity:0.8;}
    100%{opacity:0;}
  }

  /* Growth notification */
  .grow-anim{
    animation: grow-pulse 2s ease-in-out;
  }
  @keyframes grow-pulse{
    0%,100%{transform:scale(1);}
    30%,70%{transform:scale(1.2); filter: brightness(1.5) hue-rotate(15deg);}
  }

  @media (max-height: 700px){
    .device{ gap: 8px; padding: 12px; }
    .actions .action{ padding: 8px 4px; font-size: 9px; }
    .action-icon{ font-size: 18px; }
    #pet{ width: 45%; }
  }
</style>
</head>
<body>
<div class="device">
  <div class="topbar">
    <div class="name-box">
      <span id="pet-name">Blob</span>
      <span class="badge" id="pet-age">Egg</span>
    </div>
    <button id="menu-btn">⚙</button>
  </div>

  <div class="screen" id="screen">
    <div class="stats" id="stats"></div>
    <div class="pet-stage" id="stage">
      <div class="pet-scene" id="scene">
        <div class="hearts" id="hearts"></div>
        <svg id="pet" viewBox="0 0 200 200"></svg>
        <div class="ground"></div>
        <div class="zzz" id="zzz">Z</div>
      </div>
      <div class="bubble" id="bubble"></div>
      <div class="mood-tag" id="mood-tag">idle</div>
      <div class="stage-info" id="stage-tag"></div>
    </div>
    <div class="log" id="log"></div>
    <div class="flash" id="flash"></div>
  </div>

  <div class="actions">
    <button class="action" data-act="feed"><span class="action-icon">🍎</span><span>Feed</span></button>
    <button class="action" data-act="water"><span class="action-icon">💧</span><span>Water</span></button>
    <button class="action" data-act="bath"><span class="action-icon">🛁</span><span>Bath</span></button>
    <button class="action" data-act="play"><span class="action-icon">🎾</span><span>Play</span></button>
    <button class="action" data-act="park"><span class="action-icon">🌳</span><span>Park</span></button>
    <button class="action" data-act="pet"><span class="action-icon">🤗</span><span>Pet</span></button>
    <button class="action" data-act="medicine"><span class="action-icon">💊</span><span>Heal</span></button>
    <button class="action" data-act="sleep"><span class="action-icon">💤</span><span id="sleep-label">Sleep</span></button>
  </div>

  <div class="chat-bar">
    <input class="chat-input" id="chat-input" placeholder="Talk to your pet..." maxlength="120" autocomplete="off" />
    <button class="send-btn" id="send-btn">→</button>
  </div>

  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <h2 id="modal-title">Name your pet</h2>
      <p id="modal-text">What would you like to call them?</p>
      <input type="text" id="modal-input" maxlength="16" />
      <div class="modal-actions">
        <button class="btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-ok">OK</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   PETPAL — offline AI companion
   ============================================================ */

const STORAGE_KEY = "petpal.v1";

const STAT_KEYS = ["hunger","thirst","clean","energy","fun","health"];
const STAT_LABELS = {
  hunger: "Full",
  thirst: "Hydra",
  clean: "Clean",
  energy: "Rest",
  fun: "Fun",
  health: "Health"
};
// how much each stat drains per real second while awake
const DRAIN = {
  hunger: 0.08,
  thirst: 0.12,
  clean: 0.05,
  energy: 0.05,
  fun: 0.06,
  health: 0.01
};

const STAGES = [
  { name: "Egg",   until: 0.02, size: 0.55, minutes: 1 }, // hatches after 1 minute
  { name: "Baby",  until: 0.3,  size: 0.75 },
  { name: "Kid",   until: 1,    size: 0.9 },
  { name: "Teen",  until: 3,    size: 1.0 },
  { name: "Adult", until: 999,  size: 1.1 }
];

const STOPWORDS = new Set(("a an the is are was were be been being do does did have has had "+
  "i you he she it we they me him her us them my your his hers our their this that these those "+
  "of in on at to for with by from and or but not so if then than as at").split(" "));

const DEFAULT_STATE = () => ({
  name: "Blob",
  born: Date.now(),
  lastTick: Date.now(),
  lastFed: 0,
  lastBath: 0,
  lastPark: 0,
  lastPlay: 0,
  lastPet: 0,
  hunger: 80,
  thirst: 80,
  clean: 100,
  energy: 100,
  fun: 70,
  health: 100,
  sleeping: false,
  scene: "home", // home | park | bath | night
  moodOverride: null,
  moodUntil: 0,
  actionLock: 0,
  // personality traits — grow with interaction
  traits: {
    playful: 20,
    affectionate: 20,
    talkative: 10,
    curious: 20,
    independent: 30
  },
  // vocabulary the pet learned from you
  vocab: {}, // word -> { count, mood?, lastSeen }
  phrases: [], // recent owner sentences
  totalMessages: 0,
  memories: [], // notable events
  color: null, // random on creation
  personalityDNA: null
});

let state = load();
function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return DEFAULT_STATE();
    const parsed = JSON.parse(raw);
    return Object.assign(DEFAULT_STATE(), parsed);
  }catch(e){ return DEFAULT_STATE(); }
}
function save(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}

/* ---------- SVG PET RENDERING ---------- */

function pickColor(){
  const options = [
    { body:"#c9e8b5", cheek:"#f4a8b3", outline:"#2d4a1f" },
    { body:"#a8d8f7", cheek:"#ffb3c1", outline:"#1a3a52" },
    { body:"#ffd6a5", cheek:"#f4a8b3", outline:"#5a3510" },
    { body:"#e0bbf7", cheek:"#ff8fa6", outline:"#3a1f52" },
    { body:"#fff2a8", cheek:"#f4a8b3", outline:"#5a4510" },
    { body:"#ffb3c1", cheek:"#e56b6f", outline:"#5a1830" }
  ];
  return options[Math.floor(Math.random()*options.length)];
}

function drawPet(){
  const svg = document.getElementById("pet");
  const c = state.color || (state.color = pickColor(), save(), state.color);
  const stage = getStage();

  // If egg
  if(stage.name === "Egg"){
    const shellCrack = Math.min(1, ageInHours() / stage.minutes / 60 * 60);
    svg.innerHTML = `
      <ellipse cx="100" cy="120" rx="60" ry="72" fill="${c.body}" stroke="${c.outline}" stroke-width="4"/>
      <ellipse cx="85" cy="105" rx="18" ry="10" fill="rgba(255,255,255,0.5)"/>
      ${shellCrack > 0.4 ? `<path d="M70 100 L80 110 L75 125 L85 130" stroke="${c.outline}" stroke-width="2" fill="none"/>` : ""}
      ${shellCrack > 0.7 ? `<path d="M120 90 L115 105 L125 115 L118 130" stroke="${c.outline}" stroke-width="2" fill="none"/>` : ""}
    `;
    return;
  }

  const mood = getMood();
  const asleep = state.sleeping;
  const scale = stage.size;
  const bodyR = 55 * scale;

  // eyes
  let eyeLeft, eyeRight, mouth, cheek1, cheek2, extra = "";
  const eyeY = 90;
  const eyeSpacing = 22;

  if(asleep){
    eyeLeft = `<path d="M78 ${eyeY} Q 88 ${eyeY+6} 98 ${eyeY}" stroke="${c.outline}" stroke-width="3" fill="none" stroke-linecap="round"/>`;
    eyeRight = `<path d="M102 ${eyeY} Q 112 ${eyeY+6} 122 ${eyeY}" stroke="${c.outline}" stroke-width="3" fill="none" stroke-linecap="round"/>`;
    mouth = `<path d="M92 118 Q 100 122 108 118" stroke="${c.outline}" stroke-width="3" fill="none" stroke-linecap="round"/>`;
  } else if(mood === "happy" || mood === "loved"){
    eyeLeft = `<path d="M78 ${eyeY+2} Q 88 ${eyeY-6} 98 ${eyeY+2}" stroke="${c.outline}" stroke-width="3" fill="none" stroke-linecap="round"/>`;
    eyeRight = `<path d="M102 ${eyeY+2} Q 112 ${eyeY-6} 122 ${eyeY+2}" stroke="${c.outline}" stroke-width="3" fill="none" stroke-linecap="round"/>`;
    mouth = `<path d="M88 115 Q 100 128 112 115" stroke="${c.outline}" stroke-width="3" fill="none" stroke-linecap="round"/>`;
    if(mood === "loved") extra = `<text x="60" y="60" font-size="20">💕</text>`;
  } else if(mood === "sad"){
    eyeLeft = `<circle cx="88" cy="${eyeY}" r="4" fill="${c.outline}"/><circle cx="90" cy="${eyeY-1}" r="1.5" fill="white"/>`;

  screen.classList.remove("park-bg","bath-bg","night-bg");

/* ---------- STATE MECHANICS ---------- */

function ageInHours(){
  return (Date.now() - state.born) / (1000 * 60 * 60);
}
function getStage(){
  const h = ageInHours();
  for(const s of STAGES){
    if(h < s.until) return s;
  }
  return STAGES[STAGES.length - 1];
}

function tick(){
  const now = Date.now();
  const dtSec = Math.min(60, (now - state.lastTick) / 1000);
  state.lastTick = now;

  if(state.sleeping){
    // sleeping restores energy, small hunger/thirst still drops
    state.energy = Math.min(100, state.energy + dtSec * 0.5);
    state.hunger = Math.max(0, state.hunger - dtSec * DRAIN.hunger * 0.3);
    state.thirst = Math.max(0, state.thirst - dtSec * DRAIN.thirst * 0.3);
    // auto-wake when rested
    if(state.energy >= 100 && Math.random() < 0.02){
      wakeUp("auto");
    }
  } else {
    for(const k of STAT_KEYS){
      if(k === "health") continue;
      state[k] = Math.max(0, state[k] - dtSec * DRAIN[k]);
    }
  }

  // Health drain if critical stats
  if(state.hunger < 15 || state.thirst < 10 || state.clean < 10){
    state.health = Math.max(0, state.health - dtSec * 0.3);
  } else if(state.hunger > 60 && state.thirst > 60 && state.clean > 60){
    state.health = Math.min(100, state.health + dtSec * 0.1);
  }

  // Trait drift toward independence if neglected
  const totalTime = (Date.now() - (state.lastPet||state.born)) / (1000*60*60);
  if(totalTime > 4){
    state.traits.independent = Math.min(100, state.traits.independent + 0.01);
    state.traits.affectionate = Math.max(0, state.traits.affectionate - 0.005);
  }

  // Random spontaneous chatter based on talkative + mood
  const timeSinceLastChat = (Date.now() - (state.lastAutoChat || 0)) / 1000;
  const chatChance = (state.traits.talkative / 100) * 0.02;
  if(!state.sleeping && timeSinceLastChat > 20 && Math.random() < chatChance && !isBubbleShowing()){
    speak(generateSpontaneous(), 4000);
    state.lastAutoChat = Date.now();
  }

  updateUI();
  save();
}

function getMood(){
  if(state.moodOverride && Date.now() < state.moodUntil) return state.moodOverride;
  if(state.sleeping) return "sleeping";
  if(state.health < 30) return "sick";
  if(state.hunger < 25) return "hungry";
  if(state.thirst < 20) return "hungry";
  if(state.clean < 25) return "sad";
  if(state.energy < 20) return "sad";
  if(state.fun < 20) return "sad";
  const avg = (state.hunger + state.thirst + state.clean + state.fun + state.energy) / 5;
  if(avg > 85) return "excited";
  if(avg > 70) return "happy";
  return "idle";
}

function setMoodOverride(mood, ms){
  state.moodOverride = mood;
  state.moodUntil = Date.now() + ms;
}

}

function medicine(){

    return;
  }
  state.health = Math.min(100, state.health + 40);
  state.energy = Math.max(0, state.energy - 5);

function sleep(){
  if(state.sleeping){

    return;
  }

  updateScene();
  speak("Goodnight...");

function wakeUp(reason){
  state.sleeping = false;
  state.scene = "home";
  updateScene();
  document.getElementById("sleep-label").textContent = "Sleep";
  if(reason === "auto"){
    speak(pickResponse("wake", ["Yaaawn! Good morning!","I feel great!","*stretches*"]));
  } else {
    if(state.energy < 40){
      speak("But I'm still sleepy...");
      setMoodOverride("sad", 2000);
    } else {
      speak("Good morning!");
    }
  }
  log("system", `${state.name} woke up`);
}

function spawnHearts(n){
  const container = document.getElementById("hearts");
  for(let i = 0; i < n; i++){
    setTimeout(() => {
      const h = document.createElement("div");
      h.className = "heart";
      h.textContent = ["❤","💕","✨","💖"][Math.floor(Math.random()*4)];
      h.style.left = (30 + Math.random()*40) + "%";
      h.style.top = (40 + Math.random()*20) + "%";
      container.appendChild(h);
      setTimeout(() => h.remove(), 1500);
    }, i * 200);
  }
}

function addMemory(desc){
  state.memories.unshift({ desc, when: Date.now() });
  if(state.memories.length > 20) state.memories.pop();
}

function isBubbleShowing(){
  return document.getElementById("bubble").classList.contains("show");

function pickResponse(intent, defaults){
  // seed with learned vocabulary sometimes
  const mood = getMood();
  const talkative = state.traits.talkative;
  let base = defaults[Math.floor(Math.random()*defaults.length)];

  // Mix in learned words if talkative enough
  const words = Object.keys(state.vocab)
    .filter(w => state.vocab[w].count >= 2)
    .sort((a,b) => state.vocab[b].count - state.vocab[a].count);
  if(words.length > 0 && Math.random() < talkative / 200){
    const w = words[Math.floor(Math.random() * Math.min(6, words.length))];
    base = base.replace(/\.?!?$/, "") + `... ${w}!`;
  }
  return base;
}

/* ---------- LEARNING & CHAT ---------- */

const AFFECTION_WORDS = ["love","cute","good","sweet","dear","baby","honey","precious","angel","adorable"];
const NAME_TRIGGERS = ["name","who"];
const GREETING_WORDS = ["hi","hello","hey","yo","hola","morning","evening","howdy"];
const QUESTIONS = ["how","what","why","where","when","who","are you","do you"];
const FOOD_WORDS = ["hungry","food","eat","yummy","tasty","delicious"];
const BAD_WORDS = ["bad","stupid","dumb","hate","ugly","gross"];

function handleUserMessage(rawText){
  const text = rawText.trim();
  if(!text) return;
  log("me", text);
  learn(text);
  const response = generateResponse(text);
  setTimeout(() => speak(response, 4500), 400);
}

function learn(text){
  state.totalMessages++;
  state.traits.talkative = Math.min(100, state.traits.talkative + 0.5);
  state.phrases.unshift(text);
  if(state.phrases.length > 30) state.phrases.pop();

  const words = text.toLowerCase().replace(/[^a-z0-9\s']/g, "").split(/\s+/);
  for(const w of words){
    if(w.length < 3) continue;
    if(STOPWORDS.has(w)) continue;
    if(!state.vocab[w]) state.vocab[w] = { count: 0, lastSeen: 0 };
    state.vocab[w].count++;
    state.vocab[w].lastSeen = Date.now();
  }

  // affection recognition
  const lower = text.toLowerCase();
  if(AFFECTION_WORDS.some(w => lower.includes(w))){
    state.traits.affectionate = Math.min(100, state.traits.affectionate + 1);
    state.fun = Math.min(100, state.fun + 5);
    spawnHearts(2);
  }
  if(BAD_WORDS.some(w => lower.includes(w))){
    state.traits.affectionate = Math.max(0, state.traits.affectionate - 2);
    state.fun = Math.max(0, state.fun - 10);
    setMoodOverride("sad", 3000);
  }
}

function generateResponse(text){
  const t = text.toLowerCase();
  const mood = getMood();

  // React to needs first (pet complains if suffering)
  if(state.sleeping){
    return Math.random() < 0.5 ? "... zzz ..." : "mmm... sleeping...";
  }
  if(state.health < 30){
    return pickReply(["*coughs* I don't feel so good...","I'm sick... need medicine..."]);
  }
  if(state.hunger < 20){
    return pickReply(["I'm so hungry!!","Feed me? Please?","*tummy rumbles*"]);
  }
  if(state.thirst < 20){
    return pickReply(["My mouth is so dry...","Water? Please?"]);
  }
  if(state.clean < 15){
    return pickReply(["Ew I'm dirty...","I need a bath","*smells bad*"]);
  }
  if(state.energy < 15){
    return pickReply(["So... tired...","Yaaaawn","Sleepy time?"]);
  }

  // Intent detection
  if(GREETING_WORDS.some(w => t.startsWith(w) || t.split(/\s+/).includes(w))){
    return pickReply([`Hi ${ownerNickname()}!`, "Hello!", "Hey you!", `You're here! ${excited("yay")}`]);
  }
  if(t.includes("i love you") || t.includes("love u")){
    state.traits.affectionate = Math.min(100, state.traits.affectionate + 3);
    spawnHearts(3);
    setMoodOverride("loved", 3000);
    return pickReply(["I love you too!!","💕💕💕","You make me so happy!","*wiggles happily*"]);
  }
  if(t.includes("your name") || t.includes("who are you")){
    return `I'm ${state.name}! Your ${getStage().name.toLowerCase()} pet!`;
  }
  if(t.includes("how are you") || t.includes("how do you feel") || t.includes("how r u")){
    return moodDescription();
  }
  if(t.includes("what") && (t.includes("do") || t.includes("want"))){
    return whatDoIWant();
  }
  if(t.includes("food") || t.includes("hungry") || t.includes("eat")){
    if(state.hunger < 70) return pickReply(["Yes food please!","I could eat!","Snack time?"]);
    return pickReply(["Not really hungry","Maybe later"]);
  }
  if(t.includes("play")){
    if(state.energy > 30) return pickReply(["YES PLAY!","Let's play!","Fun time!"]);
    return "Too tired to play...";
  }
  if(t.includes("park") || t.includes("outside") || t.includes("walk")){
    return pickReply(["Ooh the park?","I love outside!","Yes yes yes!"]);
  }
  if(t.includes("sleep") || t.includes("nap") || t.includes("tired")){
    return state.energy < 50 ? "I could sleep..." : "Not sleepy yet!";
  }

  // Question detection
  if(t.endsWith("?") || QUESTIONS.some(q => t.startsWith(q))){
    return generateQuestionResponse(t);
  }

  // Echo & learn — mix owner's words back
  return generateChatty(text);
}

function pickReply(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}
function excited(w){
  return state.traits.playful > 60 ? w.toUpperCase() + "!" : w + "!";
}
function ownerNickname(){
  // use most frequent affection word as nickname
  const words = Object.entries(state.vocab)
    .filter(([w]) => AFFECTION_WORDS.includes(w))
    .sort((a,b) => b[1].count - a[1].count);
  return words.length > 0 ? "friend" : "you";
}

function moodDescription(){
  const mood = getMood();
  const stage = getStage().name.toLowerCase();
  const desc = {
    happy: [`I feel great! ${randomLearnedWord()}`, "Really good today!", "I'm happy!"],
    excited: ["Amazing!!! So much energy!!", "The best!!", "SO GOOD!"],
    loved: ["Loved! So loved!", "My heart is full <3"],
    sad: ["A little sad...", "Kinda down..."],
    hungry: ["Hungry..."],
    sick: ["Not well..."],
    idle: ["I'm okay","Doing fine","Just a chill "+stage,"Meh, alright"],
    sleeping: ["Zzz..."]
  }[mood] || ["Just being me"];
  return pickReply(desc);
}

function whatDoIWant(){
  const needs = [];
  if(state.hunger < 50) needs.push("food");
  if(state.thirst < 50) needs.push("water");
  if(state.clean < 50) needs.push("a bath");
  if(state.fun < 50) needs.push("to play");
  if(state.energy < 40) needs.push("sleep");
  if(needs.length === 0){
    return pickReply(["Just hang out with you!","Cuddles maybe?","Attention pls!"]);
  }
  if(needs.length === 1) return `I want ${needs[0]}!`;
  return `Maybe ${needs.slice(0,2).join(" and ")}?`;
}

function generateQuestionResponse(t){
  // pull from learned vocab
  const w = randomLearnedWord();
  const options = [
    "Hmm... I don't know!",
    "Good question!",
    `Maybe ${w || "yes"}?`,
    "You tell me!",
    "I'm just a little pet...",
    w ? `${w}?` : "Hmm..."
  ];
  return pickReply(options);
}

function generateChatty(userText){
  const wordsInInput = userText.toLowerCase().replace(/[^a-z0-9\s']/g," ").split(/\s+/).filter(w => w.length > 2 && !STOPWORDS.has(w));
  const echoWord = wordsInInput[Math.floor(Math.random() * wordsInInput.length)] || randomLearnedWord();
  const templates = [
    `${echoWord}? Tell me more!`,
    `Ooh, ${echoWord}!`,
    `${echoWord}!!`,
    "Mmhmm mmhmm",
    "*tilts head*",
    `I like when you say "${echoWord}"`,
    "Really??",
    "Wow!",
    `Say ${echoWord} again!`
  ];
  // more sophisticated as talkative grows
  if(state.traits.talkative > 60){
    const learned = Object.keys(state.vocab)
      .filter(w => state.vocab[w].count >= 3 && w !== echoWord)
      .sort((a,b) => state.vocab[b].count - state.vocab[a].count);
    if(learned.length > 0){
      const other = learned[Math.floor(Math.random()*Math.min(5, learned.length))];
      templates.push(`${echoWord} and ${other}? Interesting!`);
      templates.push(`I remember when you said ${other}`);
    }
  }
  if(state.totalMessages > 20 && state.phrases.length > 5){
    const oldPhrase = state.phrases[Math.floor(Math.random()*Math.min(10, state.phrases.length))];
    if(oldPhrase && oldPhrase.length < 40 && Math.random() < 0.2){
      templates.push(`You once said "${oldPhrase}"... :)`);
    }
  }
  return pickReply(templates);
}

function randomLearnedWord(){
  const words = Object.keys(state.vocab).filter(w => state.vocab[w].count >= 2);
  if(words.length === 0) return "";
  return words[Math.floor(Math.random()*words.length)];
}

function generateSpontaneous(){
  const mood = getMood();
  if(mood === "sad") return pickReply(["*sigh*","Notice me?","Hey...","I'm lonely"]);
  if(mood === "hungry") return pickReply(["*tummy rumbles*","Snacks?","I could eat"]);
  if(mood === "excited") return pickReply(["Hiiii!!","Look at me!","I'm so happy!"]);
  const w = randomLearnedWord();
  if(w && Math.random() < 0.5) return pickReply([`${w}!`, `${w}...`, `Thinking about ${w}`]);
  return pickReply(["Hmm...","*whistles*","Da da da","La la la","*hums*","Boop!"]);
}

/* ---------- UI ---------- */

function updateUI(){
  document.getElementById("pet-name").textContent = state.name;
  const stage = getStage();
  document.getElementById("pet-age").textContent = stage.name;
  document.getElementById("stage-tag").textContent = stage.name;
  document.getElementById("mood-tag").textContent = state.sleeping ? "asleep" : getMood();

  const statsEl = document.getElementById("stats");
  statsEl.innerHTML = STAT_KEYS.map(k => {
    const v = Math.round(state[k]);
    let cls = "";
    if(v < 25) cls = "low";
    else if(v < 50) cls = "mid";
    return `<div class="stat">
      <div class="stat-label"><span>${STAT_LABELS[k]}</span><span>${v}</span></div>
      <div class="stat-bar"><div class="stat-fill ${cls}" style="width:${v}%"></div></div>
    </div>`;
  }).join("");

  drawPet();
  document.getElementById("sleep-label").textContent = state.sleeping ? "Wake" : "Sleep";
}

function log(who, text){
  const el = document.getElementById("log");
  const div = document.createElement("div");
  div.className = "log-entry " + who;
  const prefix = who === "me" ? "You: " : who === "pet" ? `${state.name}: ` : "";
  div.textContent = prefix + text;
  el.appendChild(div);
  while(el.children.length > 20) el.removeChild(el.firstChild);
  el.scrollTop = el.scrollHeight;
}

/* ---------- MODAL ---------- */

function showModal(title, text, defaultVal, cb){
  const bg = document.getElementById("modal-bg");
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-text").textContent = text;
  const input = document.getElementById("modal-input");
  input.value = defaultVal || "";
  bg.classList.add("show");
  setTimeout(() => input.focus(), 100);
  const ok = document.getElementById("modal-ok");
  const cancel = document.getElementById("modal-cancel");
  const done = (val) => {
    bg.classList.remove("show");
    ok.onclick = null;
    cancel.onclick = null;
    if(cb) cb(val);
  };
  ok.onclick = () => done(input.value.trim());
  cancel.onclick = () => done(null);
  input.onkeydown = (e) => { if(e.key === "Enter") done(input.value.trim()); };
}

/* ---------- MENU ---------- */

function showMenu(){
  const opts = [
    "Rename pet",
    "Show personality",
    "Show memories",
    "Reset pet",
    "Cancel"
  ];
  // Simplified: show as sequential prompts using bubble
  const choice = prompt(
    `Menu for ${state.name}:\n\n` +
    `1. Rename\n2. Show personality\n3. Show vocabulary\n4. Reset pet\n\n` +
    `Type 1-4:`
  );
  if(choice === "1"){
    showModal("Rename", "New name?", state.name, (n) => {
      if(n){ state.name = n.slice(0, 16); save(); updateUI(); speak(`I'm ${n} now!`); }
    });
  } else if(choice === "2"){
    const t = state.traits;
    const desc = Object.entries(t)
      .sort((a,b) => b[1] - a[1])
      .map(([k,v]) => `${k}: ${Math.round(v)}`)
      .join("\n");
    alert(`${state.name}'s personality:\n\n${desc}\n\nAge: ${ageInHours().toFixed(1)} hours\nMessages: ${state.totalMessages}`);
  } else if(choice === "3"){
    const words = Object.entries(state.vocab)
      .sort((a,b) => b[1].count - a[1].count)
      .slice(0, 30);
    if(words.length === 0){
      alert(`${state.name} hasn't learned any words yet. Talk to them!`);
    } else {
      alert(`Learned words:\n\n${words.map(([w,d]) => `${w} (x${d.count})`).join(", ")}`);
    }
  } else if(choice === "4"){
    if(confirm("Really reset your pet? All memories will be lost!")){
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }
  }
}

/* ---------- BINDINGS ---------- */

document.querySelectorAll(".action").forEach(btn => {
  btn.addEventListener("click", () => {
    const act = btn.dataset.act;
    ({feed, water, bath, play, park, pet, medicine, sleep}[act])();
    updateUI();

});

const chatInput = document.getElementById("chat-input");
document.getElementById("send-btn").addEventListener("click", sendChat);
chatInput.addEventListener("keydown", (e) => { if(e.key === "Enter") sendChat(); });
function sendChat(){
  const v = chatInput.value.trim();
  if(!v) return;
  chatInput.value = "";
  handleUserMessage(v);
  updateUI();
  save();
}

document.getElementById("menu-btn").addEventListener("click", showMenu);

document.getElementById("pet").addEventListener("click", () => {

  save();
});
